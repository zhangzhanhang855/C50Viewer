    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';

        // ==========================================
        // 1. 柏林噪声库
        // ==========================================
        const PERLIN = {
            p: new Uint8Array(512),
            init() {
                let p = new Uint8Array(256);
                for (let i=0; i<256; i++) p[i] = Math.floor(Math.random()*256);
                for (let i=0; i<512; i++) this.p[i] = p[i & 255];
            },
            fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); },
            lerp(t, a, b) { return a + t * (b - a); },
            grad(hash, x, y, z) {
                let h = hash & 15; let u = h < 8 ? x : y; let v = h < 4 ? y : h === 12 || h === 14 ? x : z;
                return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
            },
            noise(x, y, z) {
                let X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
                x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
                let u = this.fade(x), v = this.fade(y), w = this.fade(z);
                let A = this.p[X]+Y, AA = this.p[A]+Z, AB = this.p[A+1]+Z;
                let B = this.p[X+1]+Y, BA = this.p[B]+Z, BB = this.p[B+1]+Z;
                return this.lerp(w, this.lerp(v, this.lerp(u, this.grad(this.p[AA], x, y, z), this.grad(this.p[BA], x-1, y, z)),
                    this.lerp(u, this.grad(this.p[AB], x, y-1, z), this.grad(this.p[BB], x-1, y-1, z))),
                    this.lerp(v, this.lerp(u, this.grad(this.p[AA+1], x, y, z-1), this.grad(this.p[BA+1], x-1, y, z-1)),
                    this.lerp(u, this.grad(this.p[AB+1], x, y-1, z-1), this.grad(this.p[BB+1], x-1, y-1, z-1))));
            }
        };
        PERLIN.init();
        function hash2(x, z) { let h = Math.sin(x * 12.9898 + z * 78.233) * 43758.5453; return Math.abs(h - Math.floor(h)); }

        // ==========================================
        // 2. 方块材质生成器
        // ==========================================
        const blockDB = [];
        function hexToRgb(hex) { return {r: ((hex>>16)&255)/255, g: ((hex>>8)&255)/255, b: (hex&255)/255}; }
        function createTex(type, baseHex) {
            const canvas = document.createElement('canvas'); canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d'); const base = hexToRgb(baseHex);
            for(let x=0; x<16; x++) {
                for(let y=0; y<16; y++) {
                    let r=base.r, g=base.g, b=base.b;
                    const noise = (Math.random() - 0.5) * 0.15; r+=noise; g+=noise; b+=noise;
                    if(type==='grass_side' && y<6) { r=0.54+noise; g=0.27+noise; b=0.07+noise; }
                    if(type==='wood' && x%4===0) { r-=0.1; g-=0.1; b-=0.1; }
                    if(type==='plank' && (y%4===0 || (x===0||x===8))) { r-=0.1; g-=0.1; b-=0.1; }
                    r=Math.max(0,Math.min(1,r)); g=Math.max(0,Math.min(1,g)); b=Math.max(0,Math.min(1,b));
                    ctx.fillStyle = `rgb(${Math.floor(r*255)},${Math.floor(g*255)},${Math.floor(b*255)})`; ctx.fillRect(x,y,1,1);
                }
            }
            const tex = new THREE.CanvasTexture(canvas); tex.magFilter = THREE.NearestFilter;
            return { tex, url: canvas.toDataURL() };
        }

        blockDB[1] = { name: "草方块", type: 'multiside', top: createTex('solid', 0x55aa55), side: createTex('grass_side', 0x55aa55), bot: createTex('solid', 0x8b4513) };
        blockDB[2] = { name: "泥土", type: 'solid', tex: createTex('solid', 0x8b4513) };
        blockDB[3] = { name: "石头", type: 'solid', tex: createTex('solid', 0x808080) };
        blockDB[4] = { name: "原木", type: 'solid', tex: createTex('wood', 0x6b4226) };
        blockDB[5] = { name: "树叶", type: 'transparent', tex: createTex('solid', 0x2e8b57) };
        blockDB[6] = { name: "木板", type: 'solid', tex: createTex('plank', 0xcd853f) }; 
        blockDB[7] = { name: "玻璃", type: 'solid', tex: createTex('solid', 0xadd8e6) }; 
        blockDB[8] = { name: "基岩", type: 'solid', tex: createTex('solid', 0x333333) };

        const materials = [];
        for(let i=1; i<=8; i++) {
            const b = blockDB[i];
            if(b.type === 'multiside') {
                const s = new THREE.MeshLambertMaterial({ map: b.side.tex }), t = new THREE.MeshLambertMaterial({ map: b.top.tex }), bot = new THREE.MeshLambertMaterial({ map: b.bot.tex });
                materials[i] = [s, s, t, bot, s, s];
            } else {
                materials[i] = new THREE.MeshLambertMaterial({ map: b.tex.tex, transparent: b.type==='transparent', opacity: 0.8 });
            }
        }

        // ==========================================
        // 3. 核心变量
        // ==========================================
        let scene, camera, renderer, player, pitchObject;
        let velocity = new THREE.Vector3(); 
        const GRAVITY = 25.0, JUMP_FORCE = 8.5, SPEED = 5.0; 
        let canJump = false, prevTime = performance.now();
        let moveX = 0, moveZ = 0; 
        let moveTouchId = null, lookTouchId = null, joystickStartX = 0, joystickStartY = 0;
        const touchesData = {};

        const CHUNK_SIZE = 16, RENDER_DISTANCE = 2; 
        const blockDataMap = new Map(); 
        const chunkDecorations = new Map(); 
        const activeChunks = new Map(); 
        let currentChunkX = -999, currentChunkZ = -999;
        
        const blockGeometry = new THREE.BoxGeometry(1, 1, 1);
        let raycaster = new THREE.Raycaster(); 
        let selectionBox; 
        let playerHP = 20; 
        let targetBlockData = null; 
        let isInventoryOpen = false;
        let isDead = false;
        
        let gameTime = 6000; 
        let sunLight, hemiLight, skyColor, fog;

        const inventory = new Array(10).fill(0);
        inventory[1] = 64; inventory[6] = 64; 
        const hotbarSlots = [1, 2, 3, 4, 5, 6, 7];
        let activeHotbarIndex = 0;

        init();
        buildHUD();
        initTouchControls();
        
        // 延迟加载世界，给浏览器留出渲染“正在加载”文字的时间
        setTimeout(() => {
            updateChunks();
            document.getElementById('loading-screen').style.display = 'none';
            animate();
        }, 500);

        function init() {
            scene = new THREE.Scene();
            skyColor = new THREE.Color(0x87CEEB);
            scene.background = skyColor;
            fog = new THREE.Fog(0x87CEEB, 10, RENDER_DISTANCE * CHUNK_SIZE + 10);
            scene.fog = fog;

            hemiLight = new THREE.HemisphereLight(0xffffff, 0x444455, 0.7);
            scene.add(hemiLight);
            sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
            sunLight.position.set(100, 200, 50);
            scene.add(sunLight);

            player = new THREE.Group(); 
            player.position.set(0, 50, 0); 
            scene.add(player);

            pitchObject = new THREE.Group();
            pitchObject.position.y = 1.6; 
            player.add(pitchObject);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            pitchObject.add(camera);

            const edgesGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(1.01, 1.01, 1.01)); 
            selectionBox = new THREE.LineSegments(edgesGeo, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }));
            selectionBox.visible = false; 
            scene.add(selectionBox);

            renderer = new THREE.WebGLRenderer({ antialias: false }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); 
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
            document.getElementById('respawn-btn').addEventListener('click', respawn);
        }

        // ==========================================
        // 4. 地形生成
        // ==========================================
        function getTerrainHeight(x, z) {
            let h1 = PERLIN.noise(x*0.01, 0, z*0.01) * 20; 
            let h2 = PERLIN.noise(x*0.05, 0, z*0.05) * 5;
            let mountains = PERLIN.noise(x*0.002, 0, z*0.002);
            mountains = Math.max(0, mountains - 0.2) * 50; 
            return Math.floor(h1 + h2 + mountains) + 20;
        }

        function getBaseBlock(x, y, z) {
            if (y < 0) return 0;
            const surfaceY = getTerrainHeight(x, z);
            if (y > surfaceY) return 0;
            if (y === surfaceY) return 1; 
            if (y > surfaceY - 3) return 2; 
            if (y === 0) return 8; 
            return 3; 
        }

        function getBlock(x, y, z) {
            const key = `${x}_${y}_${z}`;
            if (blockDataMap.has(key)) return blockDataMap.get(key);
            return getBaseBlock(x, y, z);
        }

        function setBlock(x, y, z, id, updateMesh = true) {
            blockDataMap.set(`${x}_${y}_${z}`, id);
            if(updateMesh) {
                const cx = Math.floor(x / CHUNK_SIZE), cz = Math.floor(z / CHUNK_SIZE);
                if(activeChunks.has(`${cx}_${cz}`)) buildChunkMesh(cx, cz);
            }
        }

        function generateTree(bx, by, bz) {
            const height = Math.floor(hash2(bx, bz) * 3) + 4; 
            for(let y=0; y<height; y++) setBlock(bx, by+y, bz, 4, false); 
            for(let x=-2; x<=2; x++) {
                for(let z=-2; z<=2; z++) {
                    for(let y=height-2; y<=height+1; y++) {
                        if(Math.abs(x)===2 && Math.abs(z)===2 && y===height+1) continue; 
                        if(x===0 && z===0 && y<height) continue; 
                        if(getBlock(bx+x, by+y, bz+z) === 0) setBlock(bx+x, by+y, bz+z, 5, false); 
                    }
                }
            }
        }

        function generateHouse(bx, by, bz) {
            for(let x=0; x<5; x++) {
                for(let z=0; z<5; z++) {
                    for(let y=0; y<4; y++) {
                        if(x===0 || x===4 || z===0 || z===4) {
                            if(y===3) setBlock(bx+x, by+y, bz+z, 4, false); 
                            else setBlock(bx+x, by+y, bz+z, 6, false); 
                        }
                        if(y===3) setBlock(bx+x, by+y, bz+z, 6, false);
                    }
                }
            }
            setBlock(bx+2, by, bz, 0, false); setBlock(bx+2, by+1, bz, 0, false); 
            setBlock(bx, by+1, bz+2, 7, false); setBlock(bx+4, by+1, bz+2, 7, false); 
        }

        function decorateChunk(cx, cz) {
            const key = `${cx}_${cz}`;
            if(chunkDecorations.has(key)) return;
            chunkDecorations.set(key, true);

            for(let i=0; i<3; i++) {
                let lx = Math.floor(hash2(cx+i, cz) * CHUNK_SIZE);
                let lz = Math.floor(hash2(cx, cz+i) * CHUNK_SIZE);
                let gx = cx * CHUNK_SIZE + lx, gz = cz * CHUNK_SIZE + lz;
                let gy = getTerrainHeight(gx, gz);
                if(gy < 50 && hash2(gx, gz) < 0.8) generateTree(gx, gy+1, gz);
            }

            if(hash2(cx*1.1, cz*1.1) < 0.05) {
                let gx = cx * CHUNK_SIZE + 5, gz = cz * CHUNK_SIZE + 5;
                let gy = getTerrainHeight(gx, gz);
                if(Math.abs(getTerrainHeight(gx+5, gz) - gy) < 2) generateHouse(gx, gy+1, gz);
            }
        }

        function buildChunkMesh(cx, cz) {
            const key = `${cx}_${cz}`;
            if (activeChunks.has(key)) { activeChunks.get(key).children.forEach(m => m.dispose()); scene.remove(activeChunks.get(key)); }

            const chunkGroup = new THREE.Group();
            const dummy = new THREE.Object3D();
            const blocksByCategory = Array.from({length: 10}, () => []);

            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const gx = cx * CHUNK_SIZE + x, gz = cz * CHUNK_SIZE + z;
                    const topY = getTerrainHeight(gx, gz) + 25; 
                    for (let y = 0; y < topY; y++) {
                        const id = getBlock(gx, y, gz);
                        if (id === 0) continue;
                        const isVisible = getBlock(gx+1,y,gz)===0 || getBlock(gx-1,y,gz)===0 || getBlock(gx,y+1,gz)===0 || getBlock(gx,y-1,gz)===0 || getBlock(gx,y,gz+1)===0 || getBlock(gx,y,gz-1)===0 || blockDB[id].type === 'transparent';
                        if (isVisible) blocksByCategory[id].push({x: gx, y: y, z: gz});
                    }
                }
            }

            for (let id = 1; id <= 8; id++) {
                const positions = blocksByCategory[id];
                if (positions.length === 0) continue;
                const imesh = new THREE.InstancedMesh(blockGeometry, materials[id], positions.length);
                for (let i = 0; i < positions.length; i++) {
                    dummy.position.set(positions[i].x, positions[i].y, positions[i].z); dummy.updateMatrix(); imesh.setMatrixAt(i, dummy.matrix);
                }
                imesh.instanceMatrix.needsUpdate = true; chunkGroup.add(imesh);
            }
            scene.add(chunkGroup); activeChunks.set(key, chunkGroup);
        }

        // ==========================================
        // 5. 实体生物与系统
        // ==========================================
        const mobs = [];
        const mobGeo = new THREE.BoxGeometry(0.8, 0.8, 0.8);
        const pigMat = new THREE.MeshLambertMaterial({color: 0xffc0cb}); 
        const zombieMat = new THREE.MeshLambertMaterial({color: 0x006400}); 

        function spawnMob(type, x, y, z) {
            if(mobs.length > 15) return; 
            const mesh = new THREE.Mesh(mobGeo, type==='pig'?pigMat:zombieMat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
            mobs.push({ mesh: mesh, type: type, hp: type==='pig'?10:20, vel: new THREE.Vector3(), targetDir: new THREE.Vector3(), actionTimer: 0 });
        }

        function updateMobs(delta) {
            document.getElementById('mob-val').innerText = mobs.length;
            if(Math.random() < 0.02 && activeChunks.size > 0) {
                const angle = Math.random() * Math.PI * 2;
                const dist = 15 + Math.random() * 10;
                const sx = player.position.x + Math.cos(angle)*dist;
                const sz = player.position.z + Math.sin(angle)*dist;
                const sy = getTerrainHeight(sx, sz) + 1;
                const isNight = (gameTime % 24000) > 13000 && (gameTime % 24000) < 23000;
                spawnMob(isNight ? 'zombie' : 'pig', sx, sy, sz);
            }

            for(let i=mobs.length-1; i>=0; i--) {
                const mob = mobs[i];
                if(mob.mesh.position.distanceTo(player.position) > 40) {
                    scene.remove(mob.mesh); mobs.splice(i, 1); continue;
                }
                mob.actionTimer -= delta;
                if(mob.actionTimer <= 0) {
                    mob.actionTimer = 2 + Math.random() * 3;
                    if(mob.type === 'pig') {
                        if(Math.random()<0.5) mob.targetDir.set(0,0,0); 
                        else { const a = Math.random() * Math.PI * 2; mob.targetDir.set(Math.cos(a), 0, Math.sin(a)).normalize(); }
                    } else if (mob.type === 'zombie') {
                        mob.targetDir.subVectors(player.position, mob.mesh.position);
                        mob.targetDir.y = 0; mob.targetDir.normalize();
                    }
                }
                const speed = mob.type === 'pig' ? 1.5 : 2.5;
                mob.vel.x = mob.targetDir.x * speed; mob.vel.z = mob.targetDir.z * speed; mob.vel.y -= GRAVITY * delta; 

                let nx = mob.mesh.position.x + mob.vel.x * delta, ny = mob.mesh.position.y + mob.vel.y * delta, nz = mob.mesh.position.z + mob.vel.z * delta;
                if(getBlock(nx, mob.mesh.position.y, mob.mesh.position.z) !== 0) nx = mob.mesh.position.x;
                if(getBlock(mob.mesh.position.x, mob.mesh.position.y, nz) !== 0) nz = mob.mesh.position.z;
                
                if(getBlock(nx, ny-0.4, nz) !== 0) { 
                    ny = Math.floor(ny-0.4) + 1.4; mob.vel.y = 0;
                    if(mob.targetDir.length() > 0 && getBlock(nx+mob.targetDir.x, ny, nz+mob.targetDir.z) !== 0) mob.vel.y = JUMP_FORCE * 0.8; 
                }
                mob.mesh.position.set(nx, ny, nz);

                if(mob.type === 'zombie' && !isDead && mob.mesh.position.distanceTo(player.position) < 1.5) {
                    takeDamage(1);
                    velocity.add(mob.targetDir.clone().multiplyScalar(10)); velocity.y = 5;
                    mob.actionTimer = 1; 
                }
            }
        }

        // ==========================================
        // 6. UI 与伤害系统
        // ==========================================
        function takeDamage(amt) {
            if(isDead) return;
            playerHP -= amt;
            let displayHP = Math.max(0, Math.floor(playerHP));
            let full = Math.floor(displayHP/2);
            document.getElementById('hp-bar').innerText = '❤️'.repeat(full) + '🖤'.repeat(10 - full);
            if(playerHP <= 0) { isDead = true; document.getElementById('death-screen').style.display = 'flex'; }
        }

        function respawn() {
            isDead = false; playerHP = 20; takeDamage(0);
            document.getElementById('death-screen').style.display = 'none';
            player.position.set(0, getTerrainHeight(0,0)+10, 0);
            velocity.set(0,0,0);
        }

        function buildHUD() {
            const hotbarEl = document.getElementById('hotbar'); hotbarEl.innerHTML = '';
            hotbarSlots.forEach((id, index) => {
                const div = document.createElement('div'); div.className = 'slot' + (index === activeHotbarIndex ? ' active' : '');
                if(id > 0 && inventory[id] > 0) {
                    const b = blockDB[id]; div.style.backgroundImage = `url(${b.type==='multiside'?b.top.url:b.tex.url})`;
                    div.innerHTML = `<div class="slot-count">${inventory[id]}</div>`;
                }
                hotbarEl.appendChild(div);
                div.addEventListener('touchstart', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    document.querySelector('.slot.active').classList.remove('active'); div.classList.add('active');
                    activeHotbarIndex = index; document.getElementById('block-name').innerText = id > 0 ? blockDB[id].name : "空";
                });
            });
            const activeId = hotbarSlots[activeHotbarIndex]; document.getElementById('block-name').innerText = activeId > 0 ? blockDB[activeId].name : "空";
        }

        function openInventory() {
            isInventoryOpen = true; document.getElementById('inventory-modal').style.display = 'flex';
            const grid = document.getElementById('inv-grid-content'); grid.innerHTML = '';
            for(let i=1; i<=8; i++) {
                if(inventory[i] > 0) {
                    const b = blockDB[i]; const div = document.createElement('div');
                    div.className = 'inv-item' + (hotbarSlots.includes(i) ? ' equipped' : '');
                    div.style.backgroundImage = `url(${b.type==='multiside'?b.top.url:b.tex.url})`;
                    div.innerHTML = `<div class="slot-count">${inventory[i]}</div>`;
                    div.onclick = () => { hotbarSlots[activeHotbarIndex] = i; buildHUD(); openInventory(); };
                    grid.appendChild(div);
                }
            }
        }
        document.getElementById('inv-btn').addEventListener('touchstart', (e) => { e.preventDefault(); openInventory(); }, {passive: false});
        document.getElementById('close-inv').addEventListener('click', () => { isInventoryOpen = false; document.getElementById('inventory-modal').style.display = 'none'; });

        function isPlayerInBlock(bx, by, bz) {
            const minX = player.position.x - 0.3, maxX = player.position.x + 0.3;
            const minY = player.position.y, maxY = player.position.y + 1.7;
            const minZ = player.position.z - 0.3, maxZ = player.position.z + 0.3;
            const bMinX = bx - 0.5, bMaxX = bx + 0.5, bMinY = by - 0.5, bMaxY = by + 0.5, bMinZ = bz - 0.5, bMaxZ = bz + 0.5;
            return (minX < bMaxX && maxX > bMinX) && (minY < bMaxY && maxY > bMinY) && (minZ < bMaxZ && maxZ > bMinZ);
        }

        function initTouchControls() {
            const joystickBase = document.getElementById('joystick-base'); const joystickKnob = document.getElementById('joystick-knob'); const intro = document.getElementById('intro-text');
            const bindBtn = (id, fn) => { const b = document.getElementById(id); b.addEventListener('touchstart', (e) => { e.preventDefault(); b.style.background='rgba(255,255,255,0.4)'; fn(); }, {passive:false}); b.addEventListener('touchend', (e) => { e.preventDefault(); b.style.background='rgba(255,255,255,0.15)'; }, {passive:false}); };

            bindBtn('jump-btn', () => { if(canJump && !isDead){ velocity.y = JUMP_FORCE; canJump = false; }});
            bindBtn('break-btn', () => {
                if(targetBlockData && !isInventoryOpen && !isDead) {
                    const p = targetBlockData.pos; const id = getBlock(p.x, p.y, p.z);
                    if(id === 8) return; 
                    setBlock(p.x, p.y, p.z, 0); inventory[id]++; buildHUD(); selectionBox.visible = false; targetBlockData = null;
                }
            });
            bindBtn('place-btn', () => {
                if(targetBlockData && !isInventoryOpen && !isDead) {
                    const activeBlockId = hotbarSlots[activeHotbarIndex];
                    if(activeBlockId > 0 && inventory[activeBlockId] > 0) {
                        const norm = targetBlockData.normal; const p = targetBlockData.pos;
                        const nx = Math.round(p.x + norm.x), ny = Math.round(p.y + norm.y), nz = Math.round(p.z + norm.z);
                        if (!isPlayerInBlock(nx, ny, nz)) { 
                            setBlock(nx, ny, nz, activeBlockId); inventory[activeBlockId]--; buildHUD();
                        }
                    }
                }
            });

            document.addEventListener('touchstart', (e) => {
                if(isInventoryOpen || isDead || e.target.closest('.btn') || e.target.closest('#hotbar-container') || e.target.closest('#inventory-modal')) return;
                e.preventDefault(); intro.style.opacity = '0';
                for(let i=0; i<e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if(t.clientX < window.innerWidth/2) {
                        if(moveTouchId===null) {
                            moveTouchId = t.identifier; joystickStartX = t.clientX; joystickStartY = t.clientY;
                            joystickBase.style.display='block'; joystickBase.style.left=t.clientX+'px'; joystickBase.style.top=t.clientY+'px';
                            joystickKnob.style.transform=`translate(0,0)`;
                        }
                    } else { if(lookTouchId===null) { lookTouchId = t.identifier; touchesData[t.identifier] = {x:t.clientX, y:t.clientY}; } }
                }
            }, {passive:false});

            document.addEventListener('touchmove', (e) => {
                if(isInventoryOpen || isDead || e.target.closest('.btn') || e.target.closest('#hotbar-container') || e.target.closest('#inventory-modal')) return;
                e.preventDefault();
                for(let i=0; i<e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if(t.identifier === moveTouchId) {
                        let dx = t.clientX - joystickStartX, dy = t.clientY - joystickStartY;
                        let dist = Math.sqrt(dx*dx + dy*dy); if(dist > 35) { dx = (dx/dist)*35; dy = (dy/dist)*35; }
                        joystickKnob.style.transform=`translate(${dx}px, ${dy}px)`; moveX = dx/35; moveZ = dy/35;
                    } else if (t.identifier === lookTouchId) {
                        let dx = t.clientX - touchesData[t.identifier].x, dy = t.clientY - touchesData[t.identifier].y;
                        player.rotation.y -= dx * 0.007; pitchObject.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitchObject.rotation.x - dy * 0.007));
                        touchesData[t.identifier] = {x:t.clientX, y:t.clientY};
                    }
                }
            }, {passive:false});

            const endTouch = (e) => {
                for(let i=0; i<e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if(t.identifier === moveTouchId) { moveTouchId = null; moveX=0; moveZ=0; joystickBase.style.display='none'; }
                    if(t.identifier === lookTouchId) { lookTouchId = null; delete touchesData[t.identifier]; }
                }
            };
            document.addEventListener('touchend', endTouch); document.addEventListener('touchcancel', endTouch);
        }

        function checkCollision(px, py, pz) {
            const minX = Math.floor(px - 0.3 + 0.5), maxX = Math.floor(px + 0.3 + 0.5);
            const minY = Math.floor(py + 0.5), maxY = Math.floor(py + 1.7 + 0.5);
            const minZ = Math.floor(pz - 0.3 + 0.5), maxZ = Math.floor(pz + 0.3 + 0.5);
            for (let x = minX; x <= maxX; x++) {
                for (let y = minY; y <= maxY; y++) {
                    for (let z = minZ; z <= maxZ; z++) { if (getBlock(x, y, z) !== 0) return true; }
                }
            }
            return false;
        }

        function updateChunks() {
            const px = Math.floor(player.position.x / CHUNK_SIZE), pz = Math.floor(player.position.z / CHUNK_SIZE);
            if (px !== currentChunkX || pz !== currentChunkZ) {
                currentChunkX = px; currentChunkZ = pz;
                const keepChunks = new Set();
                for (let dx = -RENDER_DISTANCE; dx <= RENDER_DISTANCE; dx++) {
                    for (let dz = -RENDER_DISTANCE; dz <= RENDER_DISTANCE; dz++) {
                        const cx = px + dx, cz = pz + dz, key = `${cx}_${cz}`;
                        keepChunks.add(key);
                        decorateChunk(cx, cz); 
                        if (!activeChunks.has(key)) buildChunkMesh(cx, cz); 
                    }
                }
                for (const [key, group] of activeChunks.entries()) {
                    if (!keepChunks.has(key)) { group.children.forEach(m => m.dispose()); scene.remove(group); activeChunks.delete(key); }
                }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(isInventoryOpen) return;
            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1);
            
            gameTime = (gameTime + delta * 200) % 24000;
            const hour = gameTime / 1000;
            const cycle = (Math.sin((hour / 24) * Math.PI * 2 - Math.PI/2) + 1) / 2;
            skyColor.lerpColors(new THREE.Color(0x050510), new THREE.Color(0x87CEEB), cycle);
            hemiLight.intensity = 0.1 + cycle * 0.6;
            sunLight.intensity = Math.max(0, cycle - 0.2); 
            scene.background = skyColor; fog.color = skyColor;
            const dHour = Math.floor((hour + 6) % 24);
            document.getElementById('time-val').innerText = `${dHour.toString().padStart(2,'0')}:00`;

            if(!isDead) {
                updateChunks();

                const interactables = []; activeChunks.forEach(g => interactables.push(...g.children));
                raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                const intersects = raycaster.intersectObjects(interactables);
                if(intersects.length > 0 && intersects[0].distance < 6) {
                    const hit = intersects[0]; const mat = new THREE.Matrix4(); hit.object.getMatrixAt(hit.instanceId, mat);
                    const pos = new THREE.Vector3().setFromMatrixPosition(mat);
                    pos.x = Math.round(pos.x); pos.y = Math.round(pos.y); pos.z = Math.round(pos.z);
                    targetBlockData = { pos: pos, normal: hit.face.normal };
                    selectionBox.position.copy(pos); selectionBox.visible = true;
                } else { targetBlockData = null; selectionBox.visible = false; }

                updateMobs(delta);

                velocity.y -= GRAVITY * delta; velocity.y = Math.max(velocity.y, -40);
                const moveVec = new THREE.Vector3(moveX, 0, moveZ);
                if(moveVec.length() > 1) moveVec.normalize(); moveVec.applyAxisAngle(new THREE.Vector3(0,1,0), player.rotation.y);

                let nx = player.position.x + moveVec.x * SPEED * delta, ny = player.position.y + velocity.y * delta, nz = player.position.z + moveVec.z * SPEED * delta;
                if(checkCollision(nx, player.position.y, player.position.z)) nx = player.position.x;
                if(checkCollision(nx, player.position.y, nz)) nz = player.position.z;
                if(checkCollision(nx, ny, nz)) {
                    if(velocity.y < 0) { ny = Math.ceil(ny - 0.5) + 0.5; velocity.y = 0; canJump = true; } 
                    else { ny = Math.floor(ny + 1.7 + 0.5) - 1.7 - 0.5; velocity.y = 0; }
                } else { canJump = false; }
                player.position.set(nx, ny, nz);

                if(ny < -10) takeDamage(20); 

                document.getElementById('pos-val').innerText = `${Math.floor(nx)}, ${Math.floor(ny)}, ${Math.floor(nz)}`;
            }

            prevTime = time; renderer.render(scene, camera);
        }
    </script>
