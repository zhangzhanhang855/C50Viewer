<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Web - 物理碰撞与坠落版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        /* 准星 */
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; pointer-events: none; z-index: 100; text-shadow: 1px 1px 2px black;}
        
        /* 状态 UI */
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 1px 1px 2px black; z-index: 100; pointer-events: none;}
        
        /* 新手引导文案 */
        #intro-text { position: absolute; top: 30%; width: 100%; text-align: center; color: white; font-size: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; transition: opacity 0.5s; z-index: 50;}

        /* --- 控制按钮 --- */
        .btn {
            position: absolute; background: rgba(255, 255, 255, 0.2); border: 3px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold; z-index: 100; backdrop-filter: blur(4px);
        }
        #jump-btn { bottom: 30px; right: 30px; width: 70px; height: 70px; }
        #place-btn { bottom: 120px; right: 30px; width: 60px; height: 60px; font-size: 24px;}
        #break-btn { bottom: 30px; right: 120px; width: 60px; height: 60px; font-size: 24px;}

        /* --- 摇杆 --- */
        #joystick-base { position: absolute; width: 120px; height: 120px; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.5); border-radius: 50%; display: none; z-index: 100; transform: translate(-50%, -50%); pointer-events: none; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.8); border-radius: 50%; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }

        /* --- 优化后的物品栏 (Hotbar) --- */
        #hotbar {
            position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 2px; background: rgba(30, 30, 30, 0.8); padding: 4px; 
            border: 3px solid #555; border-radius: 4px; z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .slot {
            width: 45px; height: 45px; border: 2px solid #888; background-color: #aaa;
            box-sizing: border-box; transition: 0.1s; position: relative;
            box-shadow: inset 2px 2px 0px rgba(255,255,255,0.4), inset -2px -2px 0px rgba(0,0,0,0.4);
        }
        /* 内部色块模拟方块 */
        .slot-inner {
            position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        .slot.active { border: 3px solid white; transform: translateY(-5px); box-shadow: 0 0 15px rgba(255,255,255,0.8); }
    </style>
</head>
<body>
    <div id="crosshair">+</div>
    <div id="ui">高度 (Y): <span id="height-val">0.00</span></div>
    
    <div id="intro-text">
        👈 左屏移动 | 右屏视角 👉<br><br>走到边缘会掉入虚空！
    </div>

    <div id="jump-btn" class="btn">跳跃</div>
    <div id="place-btn" class="btn">🧱</div>
    <div id="break-btn" class="btn">⛏️</div>

    <div id="joystick-base"><div id="joystick-knob"></div></div>

    <div id="hotbar">
        <div class="slot active" data-id="0"><div class="slot-inner" style="background: #55aa55;"></div></div>
        <div class="slot" data-id="1"><div class="slot-inner" style="background: #8b4513;"></div></div>
        <div class="slot" data-id="2"><div class="slot-inner" style="background: #808080;"></div></div>
        <div class="slot" data-id="3"><div class="slot-inner" style="background: #8b5a2b;"></div></div>
        <div class="slot" data-id="4"><div class="slot-inner" style="background: #ffd700;"></div></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer;
        let player, pitchObject;
        
        let velocity = new THREE.Vector3(); 
        const GRAVITY = 25.0, JUMP_FORCE = 10.0; 
        let canJump = false, prevTime = performance.now();
        let moveX = 0, moveZ = 0; 
        let moveTouchId = null, lookTouchId = null, joystickStartX = 0, joystickStartY = 0;
        const touchesData = {};

        const objects = []; 
        let raycaster; // 准星射线
        let downRaycaster; // 脚底向下的重力射线 (新加入)
        
        const centerScreen = new THREE.Vector2(0, 0); 
        let targetBlock = null; 
        let selectionBox; 

        const blockMaterials = [
            new THREE.MeshLambertMaterial({ color: 0x55aa55 }), 
            new THREE.MeshLambertMaterial({ color: 0x8b4513 }), 
            new THREE.MeshLambertMaterial({ color: 0x808080 }), 
            new THREE.MeshLambertMaterial({ color: 0x8b5a2b }), 
            new THREE.MeshLambertMaterial({ color: 0xffd700 })  
        ];
        const blockGeometry = new THREE.BoxGeometry(1, 1, 1);
        let currentSelectedBlockId = 0;

        init();
        initTouchControls();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 0, 80);

            const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 2.5);
            scene.add(light);

            player = new THREE.Group(); 
            player.position.set(0, 5, 0); // 出生点设高一点，会有落地的感觉
            scene.add(player);

            pitchObject = new THREE.Group();
            pitchObject.position.y = 1.6; 
            player.add(pitchObject);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            pitchObject.add(camera);

            // 生成一块 10x10 的初始悬浮岛屿
            for (let x = -5; x < 5; x++) {
                for (let z = -5; z < 5; z++) {
                    const cube = new THREE.Mesh(blockGeometry, blockMaterials[0]); 
                    cube.position.set(x, 0, z);
                    scene.add(cube);
                    objects.push(cube); 
                }
            }

            const edgesGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(1.02, 1.02, 1.02)); 
            const edgesMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
            selectionBox = new THREE.LineSegments(edgesGeo, edgesMat);
            selectionBox.visible = false; 
            scene.add(selectionBox);

            raycaster = new THREE.Raycaster();
            downRaycaster = new THREE.Raycaster(); // 初始化脚部检测射线

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            const slots = document.querySelectorAll('.slot');
            slots.forEach((slot) => {
                slot.addEventListener('touchstart', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    document.querySelector('.slot.active').classList.remove('active');
                    slot.classList.add('active');
                    currentSelectedBlockId = parseInt(slot.dataset.id);
                });
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function initTouchControls() {
            const joystickBase = document.getElementById('joystick-base');
            const joystickKnob = document.getElementById('joystick-knob');
            const introText = document.getElementById('intro-text');

            const bindButton = (id, callback) => {
                const btn = document.getElementById(id);
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    btn.style.background = 'rgba(255, 255, 255, 0.5)';
                    callback();
                }, {passive: false});
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    btn.style.background = 'rgba(255, 255, 255, 0.2)';
                }, {passive: false});
            };

            bindButton('jump-btn', () => {
                if (canJump) { velocity.y = JUMP_FORCE; canJump = false; }
            });

            bindButton('break-btn', () => {
                if (targetBlock) {
                    scene.remove(targetBlock.object); 
                    objects.splice(objects.indexOf(targetBlock.object), 1); 
                    selectionBox.visible = false; 
                }
            });

            bindButton('place-btn', () => {
                if (targetBlock) {
                    const normal = targetBlock.face.normal;
                    const newPos = targetBlock.object.position.clone().add(normal);
                    
                    // 防止玩家把方块放在自己脚底和身体里卡住
                    const playerHeadPos = new THREE.Vector3(Math.round(player.position.x), Math.round(player.position.y + 1), Math.round(player.position.z));
                    const playerFootPos = new THREE.Vector3(Math.round(player.position.x), Math.round(player.position.y), Math.round(player.position.z));
                    
                    if (newPos.equals(playerHeadPos) || newPos.equals(playerFootPos)) {
                        return; // 如果要放置的位置就是玩家身体所在地，则取消放置
                    }

                    const newBlock = new THREE.Mesh(blockGeometry, blockMaterials[currentSelectedBlockId]);
                    newBlock.position.copy(newPos);
                    scene.add(newBlock);
                    objects.push(newBlock);
                }
            });

            document.addEventListener('touchstart', (e) => {
                if(e.target.closest('.btn') || e.target.closest('#hotbar')) return; 
                e.preventDefault(); introText.style.opacity = '0';

                for(let i = 0; i < e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if (t.clientX < window.innerWidth / 2) {
                        if (moveTouchId === null) {
                            moveTouchId = t.identifier;
                            joystickStartX = t.clientX; joystickStartY = t.clientY;
                            joystickBase.style.display = 'block';
                            joystickBase.style.left = joystickStartX + 'px';
                            joystickBase.style.top = joystickStartY + 'px';
                            joystickKnob.style.transform = `translate(0px, 0px)`;
                        }
                    } else {
                        if (lookTouchId === null) {
                            lookTouchId = t.identifier;
                            touchesData[lookTouchId] = { x: t.clientX, y: t.clientY };
                        }
                    }
                }
            }, {passive: false});

            document.addEventListener('touchmove', (e) => {
                if(e.target.closest('.btn') || e.target.closest('#hotbar')) return;
                e.preventDefault();
                for(let i = 0; i < e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if (t.identifier === moveTouchId) {
                        let deltaX = t.clientX - joystickStartX, deltaY = t.clientY - joystickStartY;
                        let distance = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
                        let maxDist = 50;
                        if (distance > maxDist) { deltaX = (deltaX / distance) * maxDist; deltaY = (deltaY / distance) * maxDist; }
                        joystickKnob.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                        moveX = deltaX / maxDist; moveZ = deltaY / maxDist;
                    } 
                    else if (t.identifier === lookTouchId) {
                        let deltaX = t.clientX - touchesData[lookTouchId].x, deltaY = t.clientY - touchesData[lookTouchId].y;
                        player.rotation.y -= deltaX * 0.006; 
                        pitchObject.rotation.x -= deltaY * 0.006; 
                        pitchObject.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitchObject.rotation.x));
                        touchesData[lookTouchId].x = t.clientX; touchesData[lookTouchId].y = t.clientY;
                    }
                }
            }, {passive: false});

            const onTouchEnd = (e) => {
                for(let i = 0; i < e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if (t.identifier === moveTouchId) {
                        moveTouchId = null; moveX = 0; moveZ = 0; joystickBase.style.display = 'none';
                    } else if (t.identifier === lookTouchId) {
                        lookTouchId = null; delete touchesData[t.identifier];
                    }
                }
            };
            document.addEventListener('touchend', onTouchEnd);
            document.addEventListener('touchcancel', onTouchEnd);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1); // 限制最大增量防止卡顿时穿模

            // 1. 准星射线交互检测
            raycaster.setFromCamera(centerScreen, camera);
            const intersects = raycaster.intersectObjects(objects);
            if (intersects.length > 0 && intersects[0].distance < 6) {
                targetBlock = intersects[0];
                selectionBox.position.copy(targetBlock.object.position);
                selectionBox.visible = true;
            } else {
                targetBlock = null;
                selectionBox.visible = false;
            }

            // 2. 物理与移动处理
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;
            velocity.y -= GRAVITY * delta; 

            const moveVector = new THREE.Vector3(moveX, 0, moveZ);
            if (moveVector.length() > 1) moveVector.normalize();
            moveVector.applyAxisAngle(new THREE.Vector3(0, 1, 0), player.rotation.y);

            velocity.x += moveVector.x * 40.0 * delta;
            velocity.z += moveVector.z * 40.0 * delta;

            player.position.x += velocity.x * delta;
            player.position.z += velocity.z * delta;

            // 3. 垂直碰撞检测 (向下发射射线)
            // 从脚底往上 0.1 格的位置开始向下发射，防止射线起点被埋入方块内部
            downRaycaster.set(new THREE.Vector3(player.position.x, player.position.y + 0.1, player.position.z), new THREE.Vector3(0, -1, 0));
            const groundIntersects = downRaycaster.intersectObjects(objects);

            // 如果脚下有方块，且距离小于检测容差，说明踩在方块上了
            if (groundIntersects.length > 0 && groundIntersects[0].distance <= 0.11) {
                if (velocity.y < 0) {
                    velocity.y = 0; 
                    canJump = true;
                    // 对齐到方块的顶部表面，方块 Y 在整数位，顶部是 Y + 0.5
                    player.position.y = groundIntersects[0].object.position.y + 0.5;
                }
            } else {
                canJump = false; // 在空中不能跳跃
            }

            // 应用重力下落
            player.position.y += velocity.y * delta;

            // 4. 虚空掉落机制 (Respawn)
            if (player.position.y < -20) {
                // 掉入虚空，重置位置到起始点上方
                player.position.set(0, 10, 0);
                velocity.set(0, 0, 0);
            }

            document.getElementById('height-val').innerText = player.position.y.toFixed(2);
            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
