<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Minecraft Web - 高级重力版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; }
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; pointer-events: none; z-index: 100; }
        #ui { position: absolute; bottom: 20px; left: 20px; color: white; text-shadow: 1px 1px 2px black; }
        #blocker { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; color: white; z-index: 10; }
        #instructions { text-align: center; cursor: pointer; padding: 40px; border: 2px solid white; background: rgba(0,0,0,0.3); }
    </style>
</head>
<body>
    <div id="crosshair">+</div>
    <div id="ui">高度 (Y): <span id="height-val">0</span></div>
    <div id="blocker">
        <div id="instructions">
            <h1>点击屏幕进入世界</h1>
            <p>WASD 移动 | <b>SPACE 跳跃</b> | 鼠标转动视角</p>
            <p style="color: #aaa;">(若无法开始，请刷新并确保点击了方框内部)</p>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- 核心变量 ---
        let scene, camera, renderer, controls;
        let moveForward = false, moveBackward = false, moveLeft = false, moveRight = false, canJump = false;
        
        // 物理参数
        let velocity = new THREE.Vector3(); // 瞬时速度
        let direction = new THREE.Vector3(); // 移动方向
        const GRAVITY = 30.0;    // 重力强度
        const JUMP_FORCE = 12.0; // 跳跃力度
        const PLAYER_HEIGHT = 1.8; // 玩家身高（米）
        
        let prevTime = performance.now();

        init();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 0, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            // 初始高度设为 5
            camera.position.y = 5;

            const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 2.5);
            scene.add(light);

            controls = new PointerLockControls(camera, document.body);
            
            const blocker = document.getElementById('blocker');
            blocker.addEventListener('click', () => controls.lock());
            controls.addEventListener('lock', () => blocker.style.display = 'none');
            controls.addEventListener('unlock', () => blocker.style.display = 'flex');
            scene.add(controls.getObject());

            // 键盘逻辑
            const onKeyDown = (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = true; break;
                    case 'KeyS': moveBackward = true; break;
                    case 'KeyA': moveLeft = true; break;
                    case 'KeyD': moveRight = true; break;
                    case 'Space': 
                        if (canJump) velocity.y += JUMP_FORCE; 
                        canJump = false; 
                        break;
                }
            };
            const onKeyUp = (e) => {
                switch (e.code) {
                    case 'KeyW': moveForward = false; break;
                    case 'KeyS': moveBackward = false; break;
                    case 'KeyA': moveLeft = false; break;
                    case 'KeyD': moveRight = false; break;
                }
            };
            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // 生成地面 (Minecraft 风格方块)
            const boxSize = 1;
            const geometry = new THREE.BoxGeometry(boxSize, boxSize, boxSize);
            const material = new THREE.MeshLambertMaterial({ color: 0x55aa55 });

            for (let x = -20; x < 20; x++) {
                for (let z = -20; z < 20; z++) {
                    const cube = new THREE.Mesh(geometry, material);
                    cube.position.set(x, 0, z);
                    scene.add(cube);
                }
            }

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            if (controls.isLocked) {
                // 1. 水平摩擦力处理 (空气阻力)
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;

                // 2. 重力处理
                velocity.y -= GRAVITY * delta; 

                // 3. 计算方向
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize();

                // 4. 应用推力
                if (moveForward || moveBackward) velocity.z -= direction.z * 100.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 100.0 * delta;

                // 5. 应用位移
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);
                
                // 高度/跳跃位移
                const playerObj = controls.getObject();
                playerObj.position.y += (velocity.y * delta);

                // 6. 简单的地面碰撞检测 (高度机制)
                // 假设地面高度为 0.5 (方块中心在0，高度1)，眼睛高度为地面+PLAYER_HEIGHT
                const groundLevel = 0.5 + PLAYER_HEIGHT;
                if (playerObj.position.y < groundLevel) {
                    velocity.y = 0;
                    playerObj.position.y = groundLevel;
                    canJump = true;
                }

                // 更新UI显示高度
                document.getElementById('height-val').innerText = (playerObj.position.y - groundLevel).toFixed(2);
            }

            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
