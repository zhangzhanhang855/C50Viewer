<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minecraft Web - 互动建造版</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Segoe UI', sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        /* 准星 */
        #crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; font-size: 24px; pointer-events: none; z-index: 100; text-shadow: 1px 1px 2px black;}
        
        /* 状态 UI */
        #ui { position: absolute; top: 20px; left: 20px; color: white; text-shadow: 1px 1px 2px black; z-index: 100; pointer-events: none;}
        
        /* 新手引导文案 */
        #intro-text { position: absolute; top: 30%; width: 100%; text-align: center; color: white; font-size: 20px; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); pointer-events: none; transition: opacity 0.5s; z-index: 50;}

        /* --- 控制按钮 --- */
        .btn {
            position: absolute; background: rgba(255, 255, 255, 0.2); border: 3px solid rgba(255, 255, 255, 0.6);
            border-radius: 50%; color: white; display: flex; justify-content: center; align-items: center;
            font-size: 20px; font-weight: bold; z-index: 100; backdrop-filter: blur(4px);
        }
        #jump-btn { bottom: 30px; right: 30px; width: 70px; height: 70px; }
        #place-btn { bottom: 120px; right: 30px; width: 60px; height: 60px; font-size: 24px;}
        #break-btn { bottom: 30px; right: 120px; width: 60px; height: 60px; font-size: 24px;}

        /* --- 摇杆 --- */
        #joystick-base { position: absolute; width: 120px; height: 120px; background: rgba(255, 255, 255, 0.1); border: 2px solid rgba(255, 255, 255, 0.5); border-radius: 50%; display: none; z-index: 100; transform: translate(-50%, -50%); pointer-events: none; }
        #joystick-knob { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255, 255, 255, 0.8); border-radius: 50%; box-shadow: 0 4px 8px rgba(0,0,0,0.3); }

        /* --- 物品栏 (Hotbar) --- */
        #hotbar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 5px; background: rgba(0, 0, 0, 0.5); padding: 5px; border-radius: 8px; z-index: 100;
        }
        .slot {
            width: 40px; height: 40px; border: 2px solid #555; border-radius: 4px; box-sizing: border-box; transition: 0.2s;
        }
        .slot.active { border: 3px solid white; transform: scale(1.1); box-shadow: 0 0 10px white; }
    </style>
</head>
<body>
    <div id="crosshair">+</div>
    <div id="ui">高度: <span id="height-val">0.00</span></div>
    
    <div id="intro-text">
        👈 <b>左半边滑动</b>移动 | <b>右半边滑动</b>视角 👉<br><br>点击底部物品栏切换方块
    </div>

    <div id="jump-btn" class="btn">跳跃</div>
    <div id="place-btn" class="btn">🧱</div>
    <div id="break-btn" class="btn">⛏️</div>

    <div id="joystick-base"><div id="joystick-knob"></div></div>

    <div id="hotbar">
        <div class="slot active" data-id="0"></div>
        <div class="slot" data-id="1"></div>
        <div class="slot" data-id="2"></div>
        <div class="slot" data-id="3"></div>
        <div class="slot" data-id="4"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- 核心变量 ---
        let scene, camera, renderer;
        let player, pitchObject;
        
        // 物理与移动
        let velocity = new THREE.Vector3(); 
        const GRAVITY = 30.0, JUMP_FORCE = 12.0; 
        let canJump = true, prevTime = performance.now();
        let moveX = 0, moveZ = 0; 
        let moveTouchId = null, lookTouchId = null, joystickStartX = 0, joystickStartY = 0;
        const touchesData = {};

        // --- 互动与方块系统 ---
        const objects = []; // 存储所有可互动方块
        let raycaster;
        const centerScreen = new THREE.Vector2(0, 0); // 屏幕中心
        let targetBlock = null; // 当前准星对准的方块交点数据
        let selectionBox; // 黑色高亮边框

        // 定义 5 种方块材质
        const blockMaterials = [
            new THREE.MeshLambertMaterial({ color: 0x55aa55 }), // 0: 草地绿
            new THREE.MeshLambertMaterial({ color: 0x8b4513 }), // 1: 泥土棕
            new THREE.MeshLambertMaterial({ color: 0x808080 }), // 2: 石头灰
            new THREE.MeshLambertMaterial({ color: 0x8b5a2b }), // 3: 木头色
            new THREE.MeshLambertMaterial({ color: 0xffd700 })  // 4: 金块黄
        ];
        const blockGeometry = new THREE.BoxGeometry(1, 1, 1);
        let currentSelectedBlockId = 0;

        init();
        initTouchControls();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 0, 80);

            const light = new THREE.HemisphereLight(0xeeeeff, 0x777788, 2.5);
            scene.add(light);

            // 玩家载体
            player = new THREE.Group(); 
            player.position.set(0, 5, 0);
            scene.add(player);

            pitchObject = new THREE.Group();
            pitchObject.position.y = 1.6; // 眼睛高度
            player.add(pitchObject);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            pitchObject.add(camera);

            // 初始化生成平地
            for (let x = -15; x < 15; x++) {
                for (let z = -15; z < 15; z++) {
                    const cube = new THREE.Mesh(blockGeometry, blockMaterials[0]); // 默认草地
                    cube.position.set(x, 0, z);
                    scene.add(cube);
                    objects.push(cube); // 加入互动数组
                }
            }

            // --- 边界感 (高亮边框) ---
            const edgesGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(1.02, 1.02, 1.02)); // 比方块大一点点避免Z轴冲突
            const edgesMat = new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 });
            selectionBox = new THREE.LineSegments(edgesGeo, edgesMat);
            selectionBox.visible = false; // 默认隐藏
            scene.add(selectionBox);

            raycaster = new THREE.Raycaster();

            // 渲染器
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 初始化物品栏UI颜色
            const slots = document.querySelectorAll('.slot');
            slots.forEach((slot, index) => {
                slot.style.backgroundColor = '#' + blockMaterials[index].color.getHexString();
                // 物品栏点击事件
                slot.addEventListener('touchstart', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    document.querySelector('.slot.active').classList.remove('active');
                    slot.classList.add('active');
                    currentSelectedBlockId = parseInt(slot.dataset.id);
                });
            });

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function initTouchControls() {
            const joystickBase = document.getElementById('joystick-base');
            const joystickKnob = document.getElementById('joystick-knob');
            const introText = document.getElementById('intro-text');

            // --- 互动按钮逻辑 ---
            const bindButton = (id, callback) => {
                const btn = document.getElementById(id);
                btn.addEventListener('touchstart', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    btn.style.background = 'rgba(255, 255, 255, 0.5)';
                    callback();
                }, {passive: false});
                btn.addEventListener('touchend', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    btn.style.background = 'rgba(255, 255, 255, 0.2)';
                }, {passive: false});
            };

            // 跳跃
            bindButton('jump-btn', () => {
                if (canJump) { velocity.y = JUMP_FORCE; canJump = false; }
            });

            // 破坏方块
            bindButton('break-btn', () => {
                if (targetBlock) {
                    scene.remove(targetBlock.object); // 从场景移除
                    objects.splice(objects.indexOf(targetBlock.object), 1); // 从数组移除
                    selectionBox.visible = false; // 暂时隐藏边框
                }
            });

            // 放置方块
            bindButton('place-btn', () => {
                if (targetBlock) {
                    // 获取点击面的法线向量 (指明是在哪个面上放置)
                    const normal = targetBlock.face.normal;
                    // 计算新方块的位置：被点击方块的位置 + 法线方向
                    const newPos = targetBlock.object.position.clone().add(normal);
                    
                    // 生成新方块
                    const newBlock = new THREE.Mesh(blockGeometry, blockMaterials[currentSelectedBlockId]);
                    newBlock.position.copy(newPos);
                    scene.add(newBlock);
                    objects.push(newBlock);
                }
            });

            // --- 全局滑动逻辑 ---
            document.addEventListener('touchstart', (e) => {
                if(e.target.closest('.btn') || e.target.closest('#hotbar')) return; // 忽略 UI 区域
                e.preventDefault(); introText.style.opacity = '0';

                for(let i = 0; i < e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if (t.clientX < window.innerWidth / 2) {
                        if (moveTouchId === null) {
                            moveTouchId = t.identifier;
                            joystickStartX = t.clientX; joystickStartY = t.clientY;
                            joystickBase.style.display = 'block';
                            joystickBase.style.left = joystickStartX + 'px';
                            joystickBase.style.top = joystickStartY + 'px';
                            joystickKnob.style.transform = `translate(0px, 0px)`;
                        }
                    } else {
                        if (lookTouchId === null) {
                            lookTouchId = t.identifier;
                            touchesData[lookTouchId] = { x: t.clientX, y: t.clientY };
                        }
                    }
                }
            }, {passive: false});

            document.addEventListener('touchmove', (e) => {
                if(e.target.closest('.btn') || e.target.closest('#hotbar')) return;
                e.preventDefault();
                for(let i = 0; i < e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if (t.identifier === moveTouchId) {
                        let deltaX = t.clientX - joystickStartX, deltaY = t.clientY - joystickStartY;
                        let distance = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
                        let maxDist = 50;
                        if (distance > maxDist) { deltaX = (deltaX / distance) * maxDist; deltaY = (deltaY / distance) * maxDist; }
                        joystickKnob.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                        moveX = deltaX / maxDist; moveZ = deltaY / maxDist;
                    } 
                    else if (t.identifier === lookTouchId) {
                        let deltaX = t.clientX - touchesData[lookTouchId].x, deltaY = t.clientY - touchesData[lookTouchId].y;
                        player.rotation.y -= deltaX * 0.006; 
                        pitchObject.rotation.x -= deltaY * 0.006; 
                        pitchObject.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitchObject.rotation.x));
                        touchesData[lookTouchId].x = t.clientX; touchesData[lookTouchId].y = t.clientY;
                    }
                }
            }, {passive: false});

            const onTouchEnd = (e) => {
                for(let i = 0; i < e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if (t.identifier === moveTouchId) {
                        moveTouchId = null; moveX = 0; moveZ = 0; joystickBase.style.display = 'none';
                    } else if (t.identifier === lookTouchId) {
                        lookTouchId = null; delete touchesData[t.identifier];
                    }
                }
            };
            document.addEventListener('touchend', onTouchEnd);
            document.addEventListener('touchcancel', onTouchEnd);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            const delta = (time - prevTime) / 1000;

            // --- 射线检测 (准星指向的方块) ---
            // 每一帧从屏幕正中央发射射线
            raycaster.setFromCamera(centerScreen, camera);
            // 检测与所有方块的交点
            const intersects = raycaster.intersectObjects(objects);

            // 距离小于 6 格才算作“够得着”
            if (intersects.length > 0 && intersects[0].distance < 6) {
                targetBlock = intersects[0];
                // 将黑框移动到被注视的方块位置
                selectionBox.position.copy(targetBlock.object.position);
                selectionBox.visible = true;
            } else {
                targetBlock = null;
                selectionBox.visible = false;
            }

            // 物理移动处理
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;
            velocity.y -= GRAVITY * delta; 

            const moveVector = new THREE.Vector3(moveX, 0, moveZ);
            if (moveVector.length() > 1) moveVector.normalize();
            moveVector.applyAxisAngle(new THREE.Vector3(0, 1, 0), player.rotation.y);

            velocity.x += moveVector.x * 60.0 * delta;
            velocity.z += moveVector.z * 60.0 * delta;

            player.position.x += velocity.x * delta;
            player.position.z += velocity.z * delta;
            player.position.y += velocity.y * delta;

            const groundLevel = 0.5;
            if (player.position.y < groundLevel) {
                velocity.y = 0; player.position.y = groundLevel; canJump = true;
            }

            document.getElementById('height-val').innerText = (player.position.y - groundLevel).toFixed(2);
            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
