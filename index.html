    <script type="module">
        import * as THREE from 'three';

        // ==========================================
        // 1. 柏林噪聲 (地形與礦脈引擎)
        // ==========================================
        const PERLIN = {
            p: new Uint8Array(512),
            init() {
                let p = new Uint8Array(256);
                for (let i=0; i<256; i++) p[i] = Math.floor(Math.random()*256);
                for (let i=0; i<512; i++) this.p[i] = p[i & 255];
            },
            fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); },
            lerp(t, a, b) { return a + t * (b - a); },
            grad(hash, x, y, z) {
                let h = hash & 15;
                let u = h < 8 ? x : y; let v = h < 4 ? y : h === 12 || h === 14 ? x : z;
                return ((h & 1) === 0 ? u : -u) + ((h & 2) === 0 ? v : -v);
            },
            noise(x, y, z) {
                let X = Math.floor(x) & 255, Y = Math.floor(y) & 255, Z = Math.floor(z) & 255;
                x -= Math.floor(x); y -= Math.floor(y); z -= Math.floor(z);
                let u = this.fade(x), v = this.fade(y), w = this.fade(z);
                let A = this.p[X]+Y, AA = this.p[A]+Z, AB = this.p[A+1]+Z;
                let B = this.p[X+1]+Y, BA = this.p[B]+Z, BB = this.p[B+1]+Z;
                return this.lerp(w, this.lerp(v, this.lerp(u, this.grad(this.p[AA], x, y, z), this.grad(this.p[BA], x-1, y, z)),
                    this.lerp(u, this.grad(this.p[AB], x, y-1, z), this.grad(this.p[BB], x-1, y-1, z))),
                    this.lerp(v, this.lerp(u, this.grad(this.p[AA+1], x, y, z-1), this.grad(this.p[BA+1], x-1, y, z-1)),
                    this.lerp(u, this.grad(this.p[AB+1], x, y-1, z-1), this.grad(this.p[BB+1], x-1, y-1, z-1))));
            }
        };
        PERLIN.init();

        // 用於礦石生成的空間 Hash 函數
        function hash3(x, y, z) {
            let h = Math.sin(x * 12.9898 + y * 78.233 + z * 37.719) * 43758.5453;
            return Math.abs(h - Math.floor(h));
        }

        // ==========================================
        // 2. 程式化 100 種方塊數據庫生成器
        // ==========================================
        const blockDB = []; // 存儲 100 種方塊的定義
        // 輔助顏色轉換
        function hexToRgb(hex) {
            let r = (hex >> 16) & 255, g = (hex >> 8) & 255, b = hex & 255;
            return {r: r/255, g: g/255, b: b/255};
        }

        // Canvas 材質生成器
        function createTex(type, baseColorHex, secondaryHex = null) {
            const canvas = document.createElement('canvas');
            canvas.width = 16; canvas.height = 16;
            const ctx = canvas.getContext('2d');
            const base = hexToRgb(baseColorHex);
            const sec = secondaryHex ? hexToRgb(secondaryHex) : null;
            
            for(let x=0; x<16; x++) {
                for(let y=0; y<16; y++) {
                    let r=base.r, g=base.g, b=base.b;
                    const noise = (Math.random() - 0.5) * 0.15;
                    r += noise; g += noise; b += noise;
                    
                    if (type === 'grass_side' && y < 6) { const dirt=hexToRgb(0x8b4513); r=dirt.r+noise; g=dirt.g+noise; b=dirt.b+noise; }
                    if (type === 'ore') {
                        const stone=hexToRgb(0x808080); r=stone.r+noise*2; g=stone.g+noise*2; b=stone.b+noise*2;
                        if(Math.random()<0.12 && sec) { r=sec.r; g=sec.g; b=sec.b; } // 礦石斑點
                    }
                    if (type === 'wood' && x%4===0) { r-=0.1; g-=0.1; b-=0.1; }
                    if (type === 'plank' && (y%4===0 || (x===0||x===8))) { r-=0.1; g-=0.1; b-=0.1; } // 木板紋理
                    if (type === 'glass' && (x===0||x===15||y===0||y===15)) { r*=1.5; g*=1.5; b*=1.5; }
                    else if (type === 'glass') { ctx.fillStyle=`rgba(${r*255},${g*255},${b*255},0.35)`; ctx.fillRect(x,y,1,1); continue; }
                    
                    r=Math.max(0,Math.min(1,r)); g=Math.max(0,Math.min(1,g)); b=Math.max(0,Math.min(1,b));
                    ctx.fillStyle = `rgb(${Math.floor(r*255)},${Math.floor(g*255)},${Math.floor(b*255)})`;
                    ctx.fillRect(x,y,1,1);
                }
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.magFilter = THREE.NearestFilter;
            return { tex, url: canvas.toDataURL() };
        }

        // 定義第 1-10 種：基礎地形方塊
        blockDB[1] = { name: "草方塊", type: 'multiside', top: createTex('solid', 0x55aa55), side: createTex('grass_side', 0x55aa55), bot: createTex('solid', 0x8b4513) };
        blockDB[2] = { name: "泥土", type: 'solid', tex: createTex('solid', 0x8b4513) };
        blockDB[3] = { name: "石頭", type: 'solid', tex: createTex('solid', 0x808080) };
        blockDB[4] = { name: "基岩", type: 'solid', tex: createTex('solid', 0x333333) };
        blockDB[5] = { name: "原木", type: 'solid', tex: createTex('wood', 0x6b4226) };
        blockDB[6] = { name: "樹葉", type: 'transparent', tex: createTex('solid', 0x2e8b57) };
        blockDB[7] = { name: "沙子", type: 'solid', tex: createTex('solid', 0xf4a460) };
        blockDB[8] = { name: "礫石", type: 'solid', tex: createTex('solid', 0x808080) };
        blockDB[9] = { name: "圓石", type: 'solid', tex: createTex('solid', 0x696969) };
        blockDB[10]= { name: "紅磚", type: 'solid', tex: createTex('plank', 0xb22222) };

        // 定義第 11-16 種：礦石
        const ores = [
            { id: 11, name: "煤礦石", color: 0x111111 }, { id: 12, name: "鐵礦石", color: 0xffdab9 },
            { id: 13, name: "金礦石", color: 0xffd700 }, { id: 14, name: "青金石礦", color: 0x4169e1 },
            { id: 15, name: "鑽石礦", color: 0x00ffff }, { id: 16, name: "綠寶石礦", color: 0x00ff00 }
        ];
        ores.forEach(o => blockDB[o.id] = { name: o.name, type: 'solid', tex: createTex('ore', 0x808080, o.color) });

        // 定義第 17-22 種：礦物磚
        ores.forEach((o, i) => blockDB[17+i] = { name: o.name.replace("石","磚").replace("礦","塊"), type: 'solid', tex: createTex('solid', o.color) });

        // 16種標準染料顏色
        const colors = [
            { n: "白色", c: 0xffffff }, { n: "橙色", c: 0xffa500 }, { n: "品紅", c: 0xff00ff }, { n: "淡藍", c: 0xadd8e6 },
            { n: "黃色", c: 0xffff00 }, { n: "黃綠", c: 0x32cd32 }, { n: "粉色", c: 0xffb6c1 }, { n: "灰色", c: 0x808080 },
            { n: "淡灰", c: 0xd3d3d3 }, { n: "青色", c: 0x00ffff }, { n: "紫色", c: 0x800080 }, { n: "藍色", c: 0x0000ff },
            { n: "棕色", c: 0x8b4513 }, { n: "綠色", c: 0x008000 }, { n: "紅色", c: 0xff0000 }, { n: "黑色", c: 0x111111 }
        ];

        // 23-38: 羊毛
        colors.forEach((c, i) => blockDB[23+i] = { name: c.n+"羊毛", type: 'solid', tex: createTex('solid', c.c) });
        // 39-54: 玻璃
        colors.forEach((c, i) => blockDB[39+i] = { name: c.n+"玻璃", type: 'transparent', tex: createTex('glass', c.c) });
        // 55-70: 混凝土
        colors.forEach((c, i) => blockDB[55+i] = { name: c.n+"混凝土", type: 'solid', tex: createTex('solid', c.c) });
        // 71-86: 陶瓦
        colors.forEach((c, i) => blockDB[71+i] = { name: c.n+"陶瓦", type: 'solid', tex: createTex('solid', c.c) });
        // 87-100: 木板與其他建材
        colors.slice(0, 14).forEach((c, i) => blockDB[87+i] = { name: c.n+"木板", type: 'solid', tex: createTex('plank', c.c) });

        // 將 blockDB 轉換為 Three.js Materials
        const materials = [];
        for(let i=1; i<=100; i++) {
            const b = blockDB[i];
            if(b.type === 'multiside') {
                const s = new THREE.MeshLambertMaterial({ map: b.side.tex }), t = new THREE.MeshLambertMaterial({ map: b.top.tex }), bot = new THREE.MeshLambertMaterial({ map: b.bot.tex });
                materials[i] = [s, s, t, bot, s, s];
            } else {
                materials[i] = new THREE.MeshLambertMaterial({ map: b.tex.tex, transparent: b.type==='transparent', opacity: b.type==='transparent'?0.8:1, side: THREE.DoubleSide });
            }
        }

        // ==========================================
        // 3. 生存系統與合成表 (Crafting & Inventory)
        // ==========================================
        // 玩家背包：記錄 100 種物品的數量
        const inventory = new Array(101).fill(0);
        
        // 給予初始生存物資
        inventory[1] = 10; inventory[5] = 10; 
        
        // 快捷欄配置 (最多 8 格)，存放 block ID
        const hotbarSlots = [1, 5, 3, 9, 23, 39, 11, 87];
        let activeHotbarIndex = 0;

        // 合成配方表
        const recipes = [
            { name: "合成木板", inId: 5, inCount: 1, outId: 87, outCount: 4 }, // 原木 -> 白木板
            { name: "合成圓石", inId: 3, inCount: 1, outId: 9, outCount: 1 },  // 石頭 -> 圓石
            { name: "合成磚塊", inId: 9, inCount: 2, outId: 10, outCount: 1 }, // 圓石 -> 紅磚
            { name: "合成煤炭塊", inId: 11, inCount: 9, outId: 17, outCount: 1 },
            { name: "合成鐵塊", inId: 12, inCount: 9, outId: 18, outCount: 1 },
            { name: "合成金塊", inId: 13, inCount: 9, outId: 19, outCount: 1 },
            { name: "合成鑽石塊", inId: 15, inCount: 9, outId: 21, outCount: 1 },
            { name: "合成白玻璃", inId: 7, inCount: 2, outId: 39, outCount: 1 } // 沙子 -> 玻璃
        ];

        // ==========================================
        // 4. 引擎核心變數
        // ==========================================
        let scene, camera, renderer, player, pitchObject;
        let velocity = new THREE.Vector3(); 
        const GRAVITY = 25.0, JUMP_FORCE = 8.5, SPEED = 4.5; 
        let canJump = false, prevTime = performance.now();
        let moveX = 0, moveZ = 0; 
        let moveTouchId = null, lookTouchId = null, joystickStartX = 0, joystickStartY = 0;
        const touchesData = {};

        const CHUNK_SIZE = 16, RENDER_DISTANCE = 2; 
        const blockDataMap = new Map(); 
        const activeChunks = new Map(); 
        let currentChunkX = -999, currentChunkZ = -999;
        
        const blockGeometry = new THREE.BoxGeometry(1, 1, 1);
        let raycaster = new THREE.Raycaster(); 
        let selectionBox; 
        let playerHP = 20; 
        let targetBlockData = null; 
        let isInventoryOpen = false;

        init();
        buildHUD();
        initTouchControls();
        animate();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 10, RENDER_DISTANCE * CHUNK_SIZE + 10);

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444455, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(100, 200, 50);
            scene.add(sun);

            player = new THREE.Group(); 
            player.position.set(0, 35, 0); 
            scene.add(player);

            pitchObject = new THREE.Group();
            pitchObject.position.y = 1.6; 
            player.add(pitchObject);

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            pitchObject.add(camera);

            const edgesGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(1.01, 1.01, 1.01)); 
            selectionBox = new THREE.LineSegments(edgesGeo, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }));
            selectionBox.visible = false; 
            scene.add(selectionBox);

            renderer = new THREE.WebGLRenderer({ antialias: false }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); // 降低像素比換取百種方塊效能
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        // ==========================================
        // 5. 地形與礦脈生成
        // ==========================================
        function getBlock(x, y, z) {
            if (y < 0) return 0; 
            const key = `${x}_${y}_${z}`;
            if (blockDataMap.has(key)) return blockDataMap.get(key);
            
            // 基礎地形高度
            let total = 0, amp = 1, freq = 0.02, max = 0;
            for(let i=0; i<2; i++) { total += PERLIN.noise(x*freq, 0, z*freq)*amp; max+=amp; amp*=0.5; freq*=2.0; }
            const surfaceY = Math.floor((total/max + 1) * 8) + 15; // 地面大約在 Y=25~31
            
            if (y > surfaceY) return 0; // 空氣
            if (y === surfaceY) {
                // 地表隨機生成樹木 (簡化：只放原木和樹葉代替)
                if(hash3(x,0,z) < 0.01) return 5; // 原木
                if(hash3(x,1,z) < 0.05) return 6; // 樹葉
                if(hash3(x,2,z) < 0.05) return 7; // 沙子點綴
                return 1; // 草地
            }
            if (y > surfaceY - 4) return 2; // 泥土
            if (y === 0) return 4; // 基岩

            // --- 核心礦物系統演算法 ---
            const h = hash3(x, y, z);
            if (h < 0.04) { // 4% 機率生成礦石
                if (y < 10 && h < 0.005) return 15; // 鑽石礦 (極深處)
                if (y < 12 && h < 0.008) return 16; // 綠寶石礦
                if (y < 15 && h < 0.015) return 13; // 金礦石
                if (y < 20 && h < 0.02)  return 14; // 青金石礦
                if (h < 0.03) return 12;            // 鐵礦石
                return 11;                          // 煤礦石
            }
            
            return 3; // 石頭
        }

        function setBlock(x, y, z, id) {
            blockDataMap.set(`${x}_${y}_${z}`, id);
            const cx = Math.floor(x / CHUNK_SIZE), cz = Math.floor(z / CHUNK_SIZE);
            buildChunkMesh(cx, cz);
            if (x % CHUNK_SIZE === 0) buildChunkMesh(cx - 1, cz);
            if (x % CHUNK_SIZE === 15) buildChunkMesh(cx + 1, cz);
            if (z % CHUNK_SIZE === 0) buildChunkMesh(cx, cz - 1);
            if (z % CHUNK_SIZE === 15) buildChunkMesh(cx, cz + 1);
        }

        function buildChunkMesh(cx, cz) {
            const key = `${cx}_${cz}`;
            if (activeChunks.has(key)) {
                activeChunks.get(key).children.forEach(m => m.dispose());
                scene.remove(activeChunks.get(key));
            }

            const chunkGroup = new THREE.Group();
            const dummy = new THREE.Object3D();
            const blocksByCategory = Array.from({length: 101}, () => []);

            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const gx = cx * CHUNK_SIZE + x;
                    const gz = cz * CHUNK_SIZE + z;
                    for (let y = 0; y < 40; y++) {
                        const id = getBlock(gx, y, gz);
                        if (id === 0) continue;

                        // 面剔除 (剔除被包圍的方塊)
                        const t = (bid) => bid === 0 || blockDB[bid].type === 'transparent';
                        if (t(getBlock(gx+1,y,gz)) || t(getBlock(gx-1,y,gz)) || t(getBlock(gx,y+1,gz)) || t(getBlock(gx,y-1,gz)) || t(getBlock(gx,y,gz+1)) || t(getBlock(gx,y,gz-1))) {
                            blocksByCategory[id].push({x: gx, y: y, z: gz});
                        }
                    }
                }
            }

            // 動態生成 100 種方塊的 InstancedMesh
            for (let id = 1; id <= 100; id++) {
                const positions = blocksByCategory[id];
                if (positions.length === 0) continue;

                const imesh = new THREE.InstancedMesh(blockGeometry, materials[id], positions.length);
                for (let i = 0; i < positions.length; i++) {
                    dummy.position.set(positions[i].x, positions[i].y, positions[i].z);
                    dummy.updateMatrix();
                    imesh.setMatrixAt(i, dummy.matrix);
                }
                imesh.instanceMatrix.needsUpdate = true;
                chunkGroup.add(imesh);
            }

            scene.add(chunkGroup);
            activeChunks.set(key, chunkGroup);
            document.getElementById('chunk-val').innerText = activeChunks.size;
        }

        // ==========================================
        // 6. UI 與背包互動邏輯
        // ==========================================
        function buildHUD() {
            const hotbarEl = document.getElementById('hotbar');
            hotbarEl.innerHTML = '';
            hotbarSlots.forEach((id, index) => {
                const div = document.createElement('div');
                div.className = 'slot' + (index === activeHotbarIndex ? ' active' : '');
                
                // 如果該格子有方塊且玩家擁有數量 > 0
                if(id > 0 && inventory[id] > 0) {
                    const b = blockDB[id];
                    div.style.backgroundImage = `url(${b.type==='multiside'?b.top.url:b.tex.url})`;
                    div.innerHTML = `<div class="slot-count">${inventory[id]}</div>`;
                }
                
                hotbarEl.appendChild(div);
                
                div.addEventListener('touchstart', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    document.querySelector('.slot.active').classList.remove('active');
                    div.classList.add('active');
                    activeHotbarIndex = index;
                    document.getElementById('block-name').innerText = id > 0 ? blockDB[id].name : "空";
                });
            });
            const activeId = hotbarSlots[activeHotbarIndex];
            document.getElementById('block-name').innerText = activeId > 0 ? blockDB[activeId].name : "空";
        }

        function openInventory() {
            isInventoryOpen = true;
            document.getElementById('inventory-modal').style.display = 'flex';
            
            // 刷新物品網格
            const grid = document.getElementById('inv-grid-content');
            grid.innerHTML = '';
            for(let i=1; i<=100; i++) {
                if(inventory[i] > 0) {
                    const b = blockDB[i];
                    const div = document.createElement('div');
                    div.className = 'inv-item' + (hotbarSlots.includes(i) ? ' equipped' : '');
                    div.style.backgroundImage = `url(${b.type==='multiside'?b.top.url:b.tex.url})`;
                    div.innerHTML = `<div class="slot-count">${inventory[i]}</div>`;
                    
                    // 點擊裝備到快捷欄
                    div.onclick = () => {
                        hotbarSlots[activeHotbarIndex] = i;
                        buildHUD();
                        openInventory(); // 刷新高亮
                    };
                    grid.appendChild(div);
                }
            }

            // 刷新合成表
            const craftList = document.getElementById('craft-list');
            craftList.innerHTML = '';
            recipes.forEach(r => {
                const bIn = blockDB[r.inId]; const bOut = blockDB[r.outId];
                const canCraft = inventory[r.inId] >= r.inCount;
                
                const item = document.createElement('div');
                item.className = 'craft-item';
                item.innerHTML = `
                    <div class="craft-icon" style="background-image: url(${bOut.type==='multiside'?bOut.top.url:bOut.tex.url})"></div>
                    <div class="craft-info">
                        <strong>${r.name}</strong><br>
                        <span class="craft-req">需要: ${bIn.name} x${r.inCount} (擁有 ${inventory[r.inId]})</span>
                    </div>
                    <button class="craft-btn" ${canCraft ? '' : 'disabled'}>合成</button>
                `;
                
                item.querySelector('.craft-btn').onclick = () => {
                    inventory[r.inId] -= r.inCount;
                    inventory[r.outId] += r.outCount;
                    buildHUD(); openInventory(); // 重新整理
                };
                craftList.appendChild(item);
            });
        }

        document.getElementById('inv-btn').addEventListener('touchstart', (e) => { e.preventDefault(); openInventory(); });
        document.getElementById('close-inv').addEventListener('click', () => { isInventoryOpen = false; document.getElementById('inventory-modal').style.display = 'none'; });

        // ==========================================
        // 7. 物理與控制
        // ==========================================
        function initTouchControls() {
            const joystickBase = document.getElementById('joystick-base');
            const joystickKnob = document.getElementById('joystick-knob');
            const intro = document.getElementById('intro-text');

            const bindBtn = (id, fn) => {
                const b = document.getElementById(id);
                b.addEventListener('touchstart', (e) => { e.preventDefault(); b.style.background='rgba(255,255,255,0.4)'; fn(); }, {passive:false});
                b.addEventListener('touchend', (e) => { e.preventDefault(); b.style.background='rgba(255,255,255,0.15)'; }, {passive:false});
            };

            bindBtn('jump-btn', () => { if(canJump){ velocity.y = JUMP_FORCE; canJump = false; }});
            
            bindBtn('break-btn', () => {
                if(targetBlockData && !isInventoryOpen) {
                    const p = targetBlockData.pos;
                    const id = getBlock(p.x, p.y, p.z);
                    if(id === 4) return; // 基岩不可破壞
                    
                    setBlock(p.x, p.y, p.z, 0); // 破壞
                    inventory[id]++; // 存入背包
                    buildHUD(); // 更新數量顯示
                    selectionBox.visible = false; targetBlockData = null;
                }
            });

            bindBtn('place-btn', () => {
                if(targetBlockData && !isInventoryOpen) {
                    const activeBlockId = hotbarSlots[activeHotbarIndex];
                    if(activeBlockId > 0 && inventory[activeBlockId] > 0) {
                        const norm = targetBlockData.normal;
                        const p = targetBlockData.pos;
                        const nx = Math.round(p.x + norm.x), ny = Math.round(p.y + norm.y), nz = Math.round(p.z + norm.z);
                        
                        // 防卡死
                        const minX=player.position.x-0.3, maxX=player.position.x+0.3, minY=player.position.y, maxY=player.position.y+1.7, minZ=player.position.z-0.3, maxZ=player.position.z+0.3;
                        if (!((minX < nx+0.5 && maxX > nx-0.5) && (minY < ny+0.5 && maxY > ny-0.5) && (minZ < nz+0.5 && maxZ > nz-0.5))) {
                            setBlock(nx, ny, nz, activeBlockId);
                            inventory[activeBlockId]--; // 消耗物品
                            buildHUD();
                        }
                    }
                }
            });

            document.addEventListener('touchstart', (e) => {
                if(isInventoryOpen || e.target.closest('.btn') || e.target.closest('#hotbar-container') || e.target.closest('#inventory-modal')) return;
                e.preventDefault(); intro.style.opacity = '0';
                for(let t of e.changedTouches) {
                    if(t.clientX < window.innerWidth/2) {
                        if(moveTouchId===null) {
                            moveTouchId = t.identifier; joystickStartX = t.clientX; joystickStartY = t.clientY;
                            joystickBase.style.display='block'; joystickBase.style.left=t.clientX+'px'; joystickBase.style.top=t.clientY+'px';
                            joystickKnob.style.transform=`translate(0,0)`;
                        }
                    } else {
                        if(lookTouchId===null) { lookTouchId = t.identifier; touchesData[t.identifier] = {x:t.clientX, y:t.clientY}; }
                    }
                }
            }, {passive:false});

            document.addEventListener('touchmove', (e) => {
                if(isInventoryOpen || e.target.closest('.btn') || e.target.closest('#hotbar-container') || e.target.closest('#inventory-modal')) return;
                e.preventDefault();
                for(let t of e.changedTouches) {
                    if(t.identifier === moveTouchId) {
                        let dx = t.clientX - joystickStartX, dy = t.clientY - joystickStartY;
                        let dist = Math.sqrt(dx*dx + dy*dy);
                        if(dist > 35) { dx = (dx/dist)*35; dy = (dy/dist)*35; }
                        joystickKnob.style.transform=`translate(${dx}px, ${dy}px)`;
                        moveX = dx/35; moveZ = dy/35;
                    } else if (t.identifier === lookTouchId) {
                        let dx = t.clientX - touchesData[t.identifier].x, dy = t.clientY - touchesData[t.identifier].y;
                        player.rotation.y -= dx * 0.007;
                        pitchObject.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitchObject.rotation.x - dy * 0.007));
                        touchesData[t.identifier] = {x:t.clientX, y:t.clientY};
                    }
                }
            }, {passive:false});

            const endTouch = (e) => {
                for(let t of e.changedTouches) {
                    if(t.identifier === moveTouchId) { moveTouchId = null; moveX=0; moveZ=0; joystickBase.style.display='none'; }
                    if(t.identifier === lookTouchId) { lookTouchId = null; delete touchesData[t.identifier]; }
                }
            };
            document.addEventListener('touchend', endTouch);
            document.addEventListener('touchcancel', endTouch);
        }

        function checkCollision(px, py, pz) {
            const minX = Math.floor(px - 0.3 + 0.5), maxX = Math.floor(px + 0.3 + 0.5);
            const minY = Math.floor(py + 0.5), maxY = Math.floor(py + 1.7 + 0.5);
            const minZ = Math.floor(pz - 0.3 + 0.5), maxZ = Math.floor(pz + 0.3 + 0.5);
            for (let x = minX; x <= maxX; x++) {
                for (let y = minY; y <= maxY; y++) {
                    for (let z = minZ; z <= maxZ; z++) {
                        if (getBlock(x, y, z) !== 0) return true;
                    }
                }
            }
            return false;
        }

        // ==========================================
        // 8. 主循環
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            if(isInventoryOpen) return; // 打開背包時暫停遊戲
            
            const time = performance.now();
            const delta = Math.min((time - prevTime) / 1000, 0.1);
            
            // 動態加載區塊
            const px = Math.floor(player.position.x / CHUNK_SIZE), pz = Math.floor(player.position.z / CHUNK_SIZE);
            if (px !== currentChunkX || pz !== currentChunkZ) {
                currentChunkX = px; currentChunkZ = pz;
                const keepChunks = new Set();
                for (let dx = -RENDER_DISTANCE; dx <= RENDER_DISTANCE; dx++) {
                    for (let dz = -RENDER_DISTANCE; dz <= RENDER_DISTANCE; dz++) {
                        const cx = px + dx, cz = pz + dz, key = `${cx}_${cz}`;
                        keepChunks.add(key);
                        if (!activeChunks.has(key)) buildChunkMesh(cx, cz);
                    }
                }
                for (const [key, group] of activeChunks.entries()) {
                    if (!keepChunks.has(key)) { group.children.forEach(m => m.dispose()); scene.remove(group); activeChunks.delete(key); }
                }
            }

            // 射線檢測
            const interactables = [];
            activeChunks.forEach(group => interactables.push(...group.children));
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObjects(interactables);
            if(intersects.length > 0 && intersects[0].distance < 6) {
                const hit = intersects[0]; const mat = new THREE.Matrix4();
                hit.object.getMatrixAt(hit.instanceId, mat);
                const pos = new THREE.Vector3().setFromMatrixPosition(mat);
                pos.x = Math.round(pos.x); pos.y = Math.round(pos.y); pos.z = Math.round(pos.z);
                targetBlockData = { pos: pos, normal: hit.face.normal };
                selectionBox.position.copy(pos); selectionBox.visible = true;
            } else { targetBlockData = null; selectionBox.visible = false; }

            // 物理運算
            velocity.y -= GRAVITY * delta;
            velocity.y = Math.max(velocity.y, -40);
            const moveVec = new THREE.Vector3(moveX, 0, moveZ);
            if(moveVec.length() > 1) moveVec.normalize();
            moveVec.applyAxisAngle(new THREE.Vector3(0,1,0), player.rotation.y);

            let nx = player.position.x + moveVec.x * SPEED * delta;
            let ny = player.position.y + velocity.y * delta;
            let nz = player.position.z + moveVec.z * SPEED * delta;

            if(checkCollision(nx, player.position.y, player.position.z)) nx = player.position.x;
            if(checkCollision(nx, player.position.y, nz)) nz = player.position.z;
            if(checkCollision(nx, ny, nz)) {
                if(velocity.y < 0) { ny = Math.ceil(ny - 0.5) + 0.5; velocity.y = 0; canJump = true; } 
                else { ny = Math.floor(ny + 1.7 + 0.5) - 1.7 - 0.5; velocity.y = 0; }
            } else { canJump = false; }
            player.position.set(nx, ny, nz);

            // 更新 UI 數據
            document.getElementById('pos-val').innerText = `${Math.floor(nx)}, ${Math.floor(ny)}, ${Math.floor(nz)}`;
            let depthStr = "地面";
            if(ny < 20) depthStr = "淺層"; if(ny < 12) depthStr = "深層礦區"; if(ny <= 2) depthStr = "基岩層";
            document.getElementById('depth-val').innerText = depthStr;

            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
