<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Web Minecraft 基础引擎</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; /* 隐藏滚动条 */
            background-color: #87CEEB; /* 天空蓝 */
        }
        /* 准星 */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            margin-top: -10px;
            margin-left: -10px;
            color: white;
            font-size: 24px;
            font-family: sans-serif;
            font-weight: bold;
            text-align: center;
            line-height: 20px;
            pointer-events: none; /* 让鼠标穿透准星 */
            z-index: 100;
        }
        /* 开始界面覆盖层 */
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-family: sans-serif;
            flex-direction: column;
            z-index: 10;
        }
        #instructions {
            font-size: 24px;
            cursor: pointer;
            padding: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            transition: background 0.3s;
        }
        #instructions:hover {
            background: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div id="crosshair">+</div>
    <div id="blocker">
        <div id="instructions">
            点击屏幕开始游戏<br><br>
            <span style="font-size:16px">WASD: 移动 | 空格: 跳跃 | 鼠标: 视角</span>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // 1. 初始化基础场景
        let camera, scene, renderer, controls;
        const objects = [];
        let raycaster;

        // 移动状态变量
        let moveForward = false;
        let moveBackward = false;
        let moveLeft = false;
        let moveRight = false;
        let canJump = false;

        let prevTime = performance.now();
        const velocity = new THREE.Vector3();
        const direction = new THREE.Vector3();

        init();
        animate();

        function init() {
            // 场景设置
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // 天空色
            scene.fog = new THREE.Fog(0x87CEEB, 0, 500); // 距离迷雾

            // 相机设置
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
            camera.position.y = 20; // 玩家身高

            // 光源设置
            const ambientLight = new THREE.AmbientLight(0xeeeeee, 0.6); // 环境光
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.8); // 太阳光
            dirLight.position.set(100, 200, 50);
            scene.add(dirLight);

            // 第一人称控制器 (PointerLock)
            controls = new PointerLockControls(camera, document.body);

            const blocker = document.getElementById('blocker');
            const instructions = document.getElementById('instructions');

            // 点击开始锁定鼠标
            instructions.addEventListener('click', function () {
                controls.lock();
            });

            controls.addEventListener('lock', function () {
                blocker.style.display = 'none';
            });

            controls.addEventListener('unlock', function () {
                blocker.style.display = 'flex';
            });
            scene.add(controls.getObject());

            // 键盘事件监听
            const onKeyDown = function (event) {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW': moveForward = true; break;
                    case 'ArrowLeft':
                    case 'KeyA': moveLeft = true; break;
                    case 'ArrowDown':
                    case 'KeyS': moveBackward = true; break;
                    case 'ArrowRight':
                    case 'KeyD': moveRight = true; break;
                    case 'Space':
                        if (canJump === true) velocity.y += 300; // 跳跃力度
                        canJump = false;
                        break;
                }
            };

            const onKeyUp = function (event) {
                switch (event.code) {
                    case 'ArrowUp':
                    case 'KeyW': moveForward = false; break;
                    case 'ArrowLeft':
                    case 'KeyA': moveLeft = false; break;
                    case 'ArrowDown':
                    case 'KeyS': moveBackward = false; break;
                    case 'ArrowRight':
                    case 'KeyD': moveRight = false; break;
                }
            };

            document.addEventListener('keydown', onKeyDown);
            document.addEventListener('keyup', onKeyUp);

            // 2. 生成世界地形 (方块)
            const boxGeometry = new THREE.BoxGeometry(10, 10, 10);
            
            // 为了简单，我们不加载图片贴图，而是给方块不同面的颜色模拟草地
            const materials = [
                new THREE.MeshLambertMaterial({ color: 0x8B4513 }), // 右 - 泥土色
                new THREE.MeshLambertMaterial({ color: 0x8B4513 }), // 左 - 泥土色
                new THREE.MeshLambertMaterial({ color: 0x55AA55 }), // 上 - 草地色
                new THREE.MeshLambertMaterial({ color: 0x8B4513 }), // 下 - 泥土色
                new THREE.MeshLambertMaterial({ color: 0x8B4513 }), // 前 - 泥土色
                new THREE.MeshLambertMaterial({ color: 0x8B4513 })  // 后 - 泥土色
            ];

            // 生成一个 40x40 的平地世界
            for (let i = -20; i < 20; i++) {
                for (let j = -20; j < 20; j++) {
                    const box = new THREE.Mesh(boxGeometry, materials);
                    box.position.x = i * 10;
                    box.position.y = 5; // 地面高度
                    box.position.z = j * 10;
                    scene.add(box);
                }
            }

            // 渲染器设置
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 窗口缩放自适应
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 3. 游戏循环 (物理引擎与渲染)
        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();

            if (controls.isLocked === true) {
                // 计算帧时间差
                const delta = (time - prevTime) / 1000;

                // 物理阻力
                velocity.x -= velocity.x * 10.0 * delta;
                velocity.z -= velocity.z * 10.0 * delta;
                velocity.y -= 9.8 * 100.0 * delta; // 重力 (9.8 * 质量)

                // 确定移动方向
                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); // 保证斜向移动速度一致

                if (moveForward || moveBackward) velocity.z -= direction.z * 400.0 * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * 400.0 * delta;

                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                // 简单的地面碰撞检测
                controls.getObject().position.y += (velocity.y * delta); // 应用垂直速度

                if (controls.getObject().position.y < 20) {
                    velocity.y = 0;
                    controls.getObject().position.y = 20; // 防止掉出世界
                    canJump = true; // 落地后允许再次跳跃
                }
            }

            prevTime = time;
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
