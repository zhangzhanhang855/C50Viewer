        function importSaveData(file) {

                    player.position.set(saveData.pos.x, saveData.pos.y, saveData.pos.z);

                    for(let i=0; i<inventory.length; i++) inventory[i] = saveData.inv[i] || 0;
                    for(let i=0; i<hotbarSlots.length; i++) hotbarSlots[i] = saveData.hotbar[i] || 0;

                    blockDataMap.clear();
                    if(saveData.blocks) saveData.blocks.forEach(([k, v]) => blockDataMap.set(k, v));
                    
                    blockEntities.clear();
                    if(saveData.entities) saveData.entities.forEach(([k, v]) => blockEntities.set(k, v));

                    // 刷新渲染与 UI
                    buildHUD(); window.takeDamage(0); 
                    activeChunks.forEach((v, k) => { v.children.forEach(c=>c.dispose()); scene.remove(v); });
                    activeChunks.clear(); currentChunkX = -999; // 强制下一帧重绘地形

                    logChat("[系统] 世界读取成功！欢迎回来！", "#55ff55");

        }

        function logChat(msg, color="#fff") {
            const log = document.getElementById('chat-log'); if(!log) return;
            log.innerHTML += `<div style="color:${color}">${msg}</div>`; log.scrollTop = log.scrollHeight;
            setTimeout(()=> { if(log.children.length > 5) log.removeChild(log.firstChild); }, 10000);
        }

        function runCommand(cmdStr, executor = {type: 'player', obj: player, name: 'Player'}, silent = false) {
            if(!cmdStr || cmdStr.trim() === "") return;
            const args = cmdStr.trim().split(/\s+/); const cmd = args[0].toLowerCase();
            try {
                if (cmd === '/gamemode' || cmd === '/gm') {
                    gameMode = (args[1]==='1' || args[1]==='c') ? 1 : 0; if(gameMode===0) { isFlying = false; document.getElementById('down-btn').style.display='none'; }
                    document.getElementById('mode-val').innerText = gameMode===1?'创造模式':'生存模式'; if(!silent) logChat(`游戏模式变更为 ${gameMode===1?'创造':'生存'}`);
                } 
                else if (cmd === '/title') {
                    let action = args[2]; let text = args.slice(3).join(' ');
                    if(action === 'clear' || action === 'reset') clearTitle(); else if(action === 'title') showTitle(text, undefined); else if(action === 'subtitle') showTitle(undefined, text);
                }
                else if (cmd === '/tellraw') { logChat(args.slice(1).join(' ').replace(/@s/g, executor.name), "#ffcc00"); }
                else if (cmd === '/tp') { player.position.set(parseFloat(args[1]), parseFloat(args[2]), parseFloat(args[3])); velocity.set(0,0,0); if(!silent) logChat(`传送到 ${args[1]} ${args[2]} ${args[3]}`); }
                else if (cmd === '/execute') { let runIdx = args.indexOf('run'); if(runIdx !== -1) { let subCmd = '/' + args.slice(runIdx+1).join(' '); runCommand(subCmd, executor, silent); } }
                else { if(!silent) logChat(`未知指令: ${cmd}`, "#ff5555"); }
            } catch(e) { if(!silent) logChat(`指令错误: ${e.message}`, "#ff5555"); }
        }

        function gameTick() {
            blockEntities.forEach((nbt, key) => {
                if(!nbt.command) return;
                if(nbt.type === 'repeat' && nbt.active === 'always') {
                    if(nbt.currentDelay > 0) { nbt.currentDelay--; } 
                    else { const [x, y, z] = key.split('_').map(Number); runCommand(nbt.command, {type:'block', name:'@', pos: {x,y,z}}, true); nbt.currentDelay = nbt.delay || 0; }
                }
            });
        }

        // ==========================================
        // 7. 地形生成
        // ==========================================
        function getTerrainHeight(x, z) { return Math.floor((PERLIN.noise(x*0.01, 0, z*0.01)*20 + PERLIN.noise(x*0.05, 0, z*0.05)*5)) + 20; }
        function getBlock(x, y, z) {
            const key = `${x}_${y}_${z}`; if (blockDataMap.has(key)) return blockDataMap.get(key);
            if (y < 0) return 0; const sy = getTerrainHeight(x, z);
            if (y > sy) return 0; if (y === sy) return 1; if (y > sy - 3) return 2; if (y === 0) return 8; return 3; 
        }
        function setBlock(x, y, z, id, updateMesh = true) {
            const key = `${x}_${y}_${z}`; blockDataMap.set(key, id);
            if (id === 20) blockEntities.set(key, { command: "", type: "impulse", active: "redstone", delay: 0, currentDelay: 0 });
            else if (id === 24) blockEntities.set(key, { command: "", type: "repeat", active: "always", delay: 0, currentDelay: 0 });
            else if (id === 25) blockEntities.set(key, { command: "", type: "chain", active: "redstone", delay: 0, currentDelay: 0 });
            else blockEntities.delete(key);
            if(updateMesh) { const cx = Math.floor(x/CHUNK_SIZE), cz = Math.floor(z/CHUNK_SIZE); if(activeChunks.has(`${cx}_${cz}`)) buildChunkMesh(cx, cz); }
        }

        function buildChunkMesh(cx, cz) {
            const key = `${cx}_${cz}`;
            if (activeChunks.has(key)) { activeChunks.get(key).children.forEach(m => m.dispose()); scene.remove(activeChunks.get(key)); }
            const chunkGroup = new THREE.Group(); const dummy = new THREE.Object3D(); const blocksByCategory = Array.from({length: blockDB.length}, () => []);
            for (let x = 0; x < CHUNK_SIZE; x++) {
                for (let z = 0; z < CHUNK_SIZE; z++) {
                    const gx = cx * CHUNK_SIZE + x, gz = cz * CHUNK_SIZE + z; const topY = getTerrainHeight(gx, gz) + 25; 
                    for (let y = 0; y < topY; y++) {
                        const id = getBlock(gx, y, gz); if (id === 0 || !blockDB[id] || blockDB[id].type === 'item') continue; 
                        const isVisible = getBlock(gx+1,y,gz)===0 || getBlock(gx-1,y,gz)===0 || getBlock(gx,y+1,gz)===0 || getBlock(gx,y-1,gz)===0 || getBlock(gx,y,gz+1)===0 || getBlock(gx,y,gz-1)===0 || blockDB[id].type === 'transparent';
                        if (isVisible) blocksByCategory[id].push({x: gx, y: y, z: gz});
                    }
                }
            }
            for (let id = 1; id < blockDB.length; id++) {
                if (!blocksByCategory[id] || blocksByCategory[id].length === 0) continue;
                const positions = blocksByCategory[id]; const imesh = new THREE.InstancedMesh(blockGeometry, materials[id], positions.length);
                for (let i = 0; i < positions.length; i++) { dummy.position.set(positions[i].x, positions[i].y, positions[i].z); dummy.updateMatrix(); imesh.setMatrixAt(i, dummy.matrix); }
                imesh.instanceMatrix.needsUpdate = true; chunkGroup.add(imesh);
            }
            scene.add(chunkGroup); activeChunks.set(key, chunkGroup);
        }

            });
            const bname = document.getElementById('block-name'); if(bname) bname.innerText = hotbarSlots[activeHotbarIndex] > 0 ? blockDB[hotbarSlots[activeHotbarIndex]].name : "空";

        function initTouchControls() {
            const jBase = document.getElementById('joystick-base'), jKnob = document.getElementById('joystick-knob');
            const bindBtn = (id, fn) => { const b = document.getElementById(id); if(b) { b.addEventListener('touchstart', (e) => { e.preventDefault(); b.style.transform='scale(0.9)'; fn(); }, {passive:false}); b.addEventListener('touchend', (e) => { e.preventDefault(); b.style.transform='scale(1)'; }, {passive:false}); }};

            const db = document.getElementById('down-btn'); if(db) db.addEventListener('touchend', () => isDescend = false);

            bindBtn('place-btn', () => {

                    if(activeBlockId > 0 && (inventory[activeBlockId] > 0 || gameMode === 1) && blockDB[activeBlockId].type !== 'item') {
                        const norm = targetBlockData.normal; const p = targetBlockData.pos;
                        const nx = Math.round(p.x + norm.x), ny = Math.round(p.y + norm.y), nz = Math.round(p.z + norm.z);
                        const minX=player.position.x-0.3, maxX=player.position.x+0.3, minY=player.position.y, maxY=player.position.y+1.7, minZ=player.position.z-0.3, maxZ=player.position.z+0.3;
                        if (!((minX < nx+0.5 && maxX > nx-0.5) && (minY < ny+0.5 && maxY > ny-0.5) && (minZ < nz+0.5 && maxZ > nz-0.5))) { 
                            setBlock(nx, ny, nz, activeBlockId); if(gameMode === 0) inventory[activeBlockId]--; buildHUD();
                        }
                    }

            });

            bindBtn('interact-btn', () => {
                if(window.isDead || isInventoryOpen || isPaused) return;
                const activeId = hotbarSlots[activeHotbarIndex];
                if(activeId === 31) {

                    runCommand("/title @s title ❄️ 雪球菜单激活"); runCommand("/title @s subtitle 准备好被抛射了吗？");
                    setTimeout(() => { runCommand(`/tp 0 ${getTerrainHeight(0,0)+20} 0`); }, 1500); 
                    return;
                }
                if(targetBlockData) {
                    const p = targetBlockData.pos; const id = getBlock(p.x, p.y, p.z); const key = `${p.x}_${p.y}_${p.z}`;
                    if(id === 20 || id === 24 || id === 25) {
                        const nbt = blockEntities.get(key);
                        if(gameMode === 1) {
                            currentEditingCmdBlock = key;
                            document.getElementById('cb-input').value = nbt ? nbt.command : ""; document.getElementById('cb-type').value = nbt ? nbt.type : "impulse";
                            document.getElementById('cb-active').value = nbt ? nbt.active : "redstone"; document.getElementById('cb-delay').value = nbt ? (nbt.delay||0) : 0;
                            document.getElementById('cb-modal').style.display = 'flex';
                        } else { if(nbt && nbt.command && nbt.type === 'impulse') runCommand(nbt.command, {type:'block', name:'@', pos: p}); }
                    }

            });

            bindBtn('attack-btn', () => { if(window.isDead || isInventoryOpen || isPaused) return; pitchObject.rotation.z = 0.05; setTimeout(()=>pitchObject.rotation.z = 0, 100); });

            document.addEventListener('touchstart', (e) => {
                if(isInventoryOpen || window.isDead || currentEditingCmdBlock || isPaused || e.target.closest('.btn') || e.target.closest('#hotbar-container') || e.target.closest('.modal-bg') || e.target.closest('#inventory-modal') || e.target.closest('#chat-modal') || e.target.closest('#cb-modal')) return;
                e.preventDefault(); 
                for(let i=0; i<e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if(t.clientX < window.innerWidth/2) {
                        if(moveTouchId===null) { moveTouchId = t.identifier; joystickStartX = t.clientX; joystickStartY = t.clientY; if(jBase){jBase.style.display='block'; jBase.style.left=t.clientX+'px'; jBase.style.top=t.clientY+'px';} if(jKnob) jKnob.style.transform=`translate(0,0)`; }
                    } else { if(lookTouchId===null) { lookTouchId = t.identifier; touchesData[t.identifier] = {x: t.clientX, y: t.clientY}; } }
                }
            }, {passive:false});

            document.addEventListener('touchmove', (e) => {
                if(isInventoryOpen || window.isDead || currentEditingCmdBlock || isPaused || e.target.closest('.btn') || e.target.closest('#hotbar-container') || e.target.closest('.modal-bg') || e.target.closest('#inventory-modal') || e.target.closest('#chat-modal') || e.target.closest('#cb-modal')) return;
                e.preventDefault();
                for(let i=0; i<e.changedTouches.length; i++) {
                    let t = e.changedTouches[i];
                    if(t.identifier === moveTouchId) {
                        let dx = t.clientX - joystickStartX, dy = t.clientY - joystickStartY; let dist = Math.sqrt(dx*dx + dy*dy); if(dist > 35) { dx = (dx/dist)*35; dy = (dy/dist)*35; }
                        if(jKnob) jKnob.style.transform=`translate(${dx}px, ${dy}px)`; moveX = dx/35; moveZ = dy/35;

        }

        function checkCollision(px, py, pz) {
            if(isFlying) return false; 
            const minX = Math.floor(px - 0.3 + 0.5), maxX = Math.floor(px + 0.3 + 0.5), minY = Math.floor(py + 0.5), maxY = Math.floor(py + 1.7 + 0.5), minZ = Math.floor(pz - 0.3 + 0.5), maxZ = Math.floor(pz + 0.3 + 0.5);
            for (let x = minX; x <= maxX; x++) { for (let y = minY; y <= maxY; y++) { for (let z = minZ; z <= maxZ; z++) { if (getBlock(x, y, z) !== 0) return true; } } }
            return false;
        }

        function updateChunks() {
            const px = Math.floor(player.position.x / CHUNK_SIZE), pz = Math.floor(player.position.z / CHUNK_SIZE);
            if (px !== currentChunkX || pz !== currentChunkZ) {
                currentChunkX = px; currentChunkZ = pz; const keep = new Set();
                for (let dx = -RENDER_DISTANCE; dx <= RENDER_DISTANCE; dx++) {
                    for (let dz = -RENDER_DISTANCE; dz <= RENDER_DISTANCE; dz++) {
                        const cx = px + dx, cz = pz + dz, key = `${cx}_${cz}`; keep.add(key);
                        if (!activeChunks.has(key)) { buildChunkMesh(cx, cz); }
                    }
                }
                for (const [key, group] of activeChunks.entries()) { if (!keep.has(key)) { group.children.forEach(m => m.dispose()); scene.remove(group); activeChunks.delete(key); } }
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if(isInventoryOpen || currentEditingCmdBlock || isPaused) {
                renderer.render(scene, camera); // 暂停时保持画面渲染
                return;
            }
            const time = performance.now(); const delta = Math.min((time - prevTime) / 1000, 0.1);
            
            tickAccumulator += delta; while(tickAccumulator >= 0.05) { tickAccumulator -= 0.05; gameTick(); }
            
            gameTime = (gameTime + delta * 200) % 24000;
            const hour = gameTime / 1000; const cycle = (Math.sin((hour / 24) * Math.PI * 2 - Math.PI/2) + 1) / 2;
            skyColor.lerpColors(new THREE.Color(0x050510), new THREE.Color(0x87CEEB), cycle);
            hemiLight.intensity = 0.1 + cycle * 0.6; sunLight.intensity = Math.max(0, cycle - 0.2); scene.background = skyColor; fog.color = skyColor;
            const dHour = Math.floor((hour + 6) % 24); const tv = document.getElementById('time-val'); if(tv) tv.innerText = `${dHour.toString().padStart(2,'0')}:00`;

            if(!window.isDead) {
                updateChunks();

                const interactables = []; activeChunks.forEach(g => interactables.push(...g.children));
                raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
                const intersects = raycaster.intersectObjects(interactables);
                if(intersects.length > 0 && intersects[0].distance < 6) {
                    const hit = intersects[0]; const mat = new THREE.Matrix4(); hit.object.getMatrixAt(hit.instanceId, mat);
                    const pos = new THREE.Vector3().setFromMatrixPosition(mat); pos.x = Math.round(pos.x); pos.y = Math.round(pos.y); pos.z = Math.round(pos.z);
                    targetBlockData = { pos: pos, normal: hit.face.normal };
                    if(selectionBox) { selectionBox.position.copy(pos); selectionBox.visible = true; }
                } else { targetBlockData = null; if(selectionBox) selectionBox.visible = false; }

                if(!isFlying) { velocity.y -= GRAVITY * delta; velocity.y = Math.max(velocity.y, -40); }
                const moveVec = new THREE.Vector3(moveX, 0, moveZ);
                if(moveVec.length() > 1) moveVec.normalize(); 
                
                const curSpeed = isFlying ? SPEED * 3 : SPEED; moveVec.applyAxisAngle(new THREE.Vector3(0,1,0), player.rotation.y);

                let nx = player.position.x + moveVec.x * curSpeed * delta, ny = player.position.y + velocity.y * delta, nz = player.position.z + moveVec.z * curSpeed * delta;
                
                if(!isFlying) {
                    if(checkCollision(nx, player.position.y, player.position.z)) nx = player.position.x;
                    if(checkCollision(nx, player.position.y, nz)) nz = player.position.z;
                    if(checkCollision(nx, ny, nz)) {
                        if(velocity.y < 0) { ny = Math.ceil(ny - 0.5) + 0.5; velocity.y = 0; canJump = true; } 
                        else { ny = Math.floor(ny + 1.7 + 0.5) - 1.7 - 0.5; velocity.y = 0; }
                    } else { canJump = false; }
                }
                player.position.set(nx, ny, nz);
                if(ny < -10 && gameMode === 0) window.takeDamage(20); 

                const pv = document.getElementById('pos-val'); if(pv) pv.innerText = `${Math.floor(nx)}, ${Math.floor(ny)}, ${Math.floor(nz)}`;
            }
            prevTime = time; renderer.render(scene, camera);
        }
