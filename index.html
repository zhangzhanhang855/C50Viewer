<head>
    <meta charset="UTF-8">
    <title>C50 分子 3D 预览器</title>
    <script src="https://3Dmol.org/build/3Dmol-min.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; margin: 0; }
        .container { display: flex; flex-direction: column; align-items: center; height: 100vh; }
        #viewer { width: 100%; height: 80vh; position: relative; }
        .info { padding: 20px; text-align: center; }
        .controls { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px; }

</head>

<script>
    $(function() {
        let element = $('#viewer');
        let config = { backgroundColor: '#222222' };
        let viewer = $3Dmol.createViewer(element, config);
        
        // 读取隐藏的 textarea 中的 XYZ 数据
        let data = $('#molecule_data').val();
        
        // 加载模型
        viewer.addModel(data, "xyz");
        
        // 设置渲染风格：球棒模型 (Sphere + Stick)
        viewer.setStyle({}, {stick:{radius:0.15}, sphere:{radius:0.4, color:'gray'}});
        
        viewer.zoomTo();
        viewer.render();
    });
</script>
