        function setupNetworkListeners() {
            // 监听其他玩家动态
            const playersRef = collection(db, 'artifacts', appId, 'public', 'data', 'players');

                    if (change.type === 'added' || change.type === 'modified') {
                        // 10秒没更新视为掉线

                    }

        // 简易 3D 方块人生成
        function updateOtherPlayer(id, data) {

                const group = new THREE.Group();

                head.position.y = 1.4;
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.9, 0.3), new THREE.MeshLambertMaterial({color: 0x3366ff}));
                body.position.y = 0.7;
                group.add(head); group.add(body);
                scene.add(group);
                otherPlayers.set(id, { group, head });
            }
            const p = otherPlayers.get(id);
            // 平滑插值 (Lerp) 可以留到以后，这里直接设定位置
            p.group.position.set(data.x, data.y, data.z);
            p.group.rotation.y = data.ry;
            p.head.rotation.x = data.rx;
            p.lastUpdate = Date.now();
        }

        function removeOtherPlayer(id) {
            if (otherPlayers.has(id)) {
                scene.remove(otherPlayers.get(id).group);
                otherPlayers.delete(id);
            }
        }

        // ==========================================
        // 2. 地形与材质生成
        // ==========================================
        const PERLIN = {
            p: new Uint8Array(512),
            init() { let p = new Uint8Array(256); for (let i=0; i<256; i++) p[i]=Math.floor(Math.random()*256); for (let i=0; i<512; i++) this.p[i]=p[i&255]; },
            fade(t) { return t*t*t*(t*(t*6-15)+10); }, lerp(t,a,b) { return a+t*(b-a); },
            grad(hash,x,y,z) { let h=hash&15; let u=h<8?x:y; let v=h<4?y:h===12||h===14?x:z; return ((h&1)===0?u:-u)+((h&2)===0?v:-v); },
            noise(x,y,z) {
                let X=Math.floor(x)&255, Y=Math.floor(y)&255, Z=Math.floor(z)&255; x-=Math.floor(x); y-=Math.floor(y); z-=Math.floor(z);
                let u=this.fade(x), v=this.fade(y), w=this.fade(z);
                let A=this.p[X]+Y, AA=this.p[A]+Z, AB=this.p[A+1]+Z; let B=this.p[X+1]+Y, BA=this.p[B]+Z, BB=this.p[B+1]+Z;
                return this.lerp(w,this.lerp(v,this.lerp(u,this.grad(this.p[AA],x,y,z),this.grad(this.p[BA],x-1,y,z)),this.lerp(u,this.grad(this.p[AB],x,y-1,z),this.grad(this.p[BB],x-1,y-1,z))),
                       this.lerp(v,this.lerp(u,this.grad(this.p[AA+1],x,y,z-1),this.grad(this.p[BA+1],x-1,y,z-1)),this.lerp(u,this.grad(this.p[AB+1],x,y-1,z-1),this.grad(this.p[BB+1],x-1,y-1,z-1))));
            }
        };
        PERLIN.init();

        const blockDB = [];
        function createTex(type, hex) {
            const canvas = document.createElement('canvas'); canvas.width=16; canvas.height=16; const ctx = canvas.getContext('2d');
            const r=(hex>>16&255)/255, g=(hex>>8&255)/255, b=(hex&255)/255;
            for(let x=0;x<16;x++){ for(let y=0;y<16;y++){
                let nr=r, ng=g, nb=b; const n=(Math.random()-0.5)*0.15; nr+=n; ng+=n; nb+=n;
                if(type==='grass_side'&&y<6){ nr=0.54+n; ng=0.27+n; nb=0.07+n; }
                if(type==='wood'&&x%4===0){ nr-=0.1; ng-=0.1; nb-=0.1; }
                ctx.fillStyle=`rgb(${Math.floor(Math.max(0,Math.min(1,nr))*255)},${Math.floor(Math.max(0,Math.min(1,ng))*255)},${Math.floor(Math.max(0,Math.min(1,nb))*255)})`;
                ctx.fillRect(x,y,1,1);
            }}
            const tex=new THREE.CanvasTexture(canvas); tex.magFilter=THREE.NearestFilter; return {tex, url:canvas.toDataURL()};
        }
        
        blockDB[1] = { name: "草方块", type: 'multiside', top: createTex('solid', 0x55aa55), side: createTex('grass_side', 0x55aa55), bot: createTex('solid', 0x8b4513) };
        blockDB[2] = { name: "泥土", type: 'solid', tex: createTex('solid', 0x8b4513) };
        blockDB[3] = { name: "石头", type: 'solid', tex: createTex('solid', 0x808080) };
        blockDB[4] = { name: "原木", type: 'solid', tex: createTex('wood', 0x6b4226) };
        blockDB[5] = { name: "树叶", type: 'transparent', tex: createTex('solid', 0x2e8b57) };
        blockDB[6] = { name: "红砖", type: 'solid', tex: createTex('solid', 0xb22222) };
        blockDB[7] = { name: "玻璃", type: 'transparent', tex: createTex('solid', 0xadd8e6) };

        const materials = [];
        for(let i=1; i<=7; i++) {
            if(blockDB[i].type === 'multiside') materials[i] = [new THREE.MeshLambertMaterial({map:blockDB[i].side.tex}), new THREE.MeshLambertMaterial({map:blockDB[i].side.tex}), new THREE.MeshLambertMaterial({map:blockDB[i].top.tex}), new THREE.MeshLambertMaterial({map:blockDB[i].bot.tex}), new THREE.MeshLambertMaterial({map:blockDB[i].side.tex}), new THREE.MeshLambertMaterial({map:blockDB[i].side.tex})];
            else materials[i] = new THREE.MeshLambertMaterial({map:blockDB[i].tex.tex, transparent:blockDB[i].type==='transparent', opacity:0.8});
        }

        // ==========================================
        // 3. 游戏引擎核心
        // ==========================================
        let scene, camera, renderer, player, pitchObject;
        let velocity = new THREE.Vector3(); 
        const GRAVITY = 25.0, JUMP_FORCE = 8.5, SPEED = 5.0; 
        let moveX=0, moveZ=0, canJump=false, prevTime=performance.now();
        
        const CHUNK_SIZE = 16, RENDER_DISTANCE = 2; 
        const blockDataMap = new Map(); 
        const activeChunks = new Map(); 
        let currentChunkX = -999, currentChunkZ = -999;
        
        const blockGeo = new THREE.BoxGeometry(1, 1, 1);
        let raycaster = new THREE.Raycaster(), selectionBox, targetBlockData = null; 

        const hotbarSlots = [1, 2, 3, 4, 5, 6, 7];
        let activeHotbarIndex = 0;

        // 启动序列
        async function boot() {
            await initMultiplayer();
            init3D();
            buildHUD();
            initControls();
            
            // 预加载地形
            updateChunks();
            document.getElementById('loading-screen').style.display = 'none';
            animate();
        }
        boot();

        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 10, RENDER_DISTANCE * CHUNK_SIZE + 5);

            scene.add(new THREE.HemisphereLight(0xffffff, 0x444455, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1.0); sun.position.set(100, 200, 50); scene.add(sun);

            player = new THREE.Group(); 
            // 出生在固定高度避免掉虚空
            player.position.set(0, 30, 0); 
            scene.add(player);

            pitchObject = new THREE.Group(); pitchObject.position.y = 1.6; player.add(pitchObject);
            camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000); pitchObject.add(camera);

            const edgesGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(1.01, 1.01, 1.01)); 
            selectionBox = new THREE.LineSegments(edgesGeo, new THREE.LineBasicMaterial({ color: 0x000000, linewidth: 2 }));
            selectionBox.visible = false; scene.add(selectionBox);

            renderer = new THREE.WebGLRenderer({ antialias: false }); 
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); 
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        }

        // ==========================================
        // 4. 世界同步逻辑
        // ==========================================
        function getTerrainY(x, z) {
            return Math.floor((PERLIN.noise(x*0.02, 0, z*0.02)*1.5 + PERLIN.noise(x*0.05, 0, z*0.05)*0.5)*10) + 15;
        }

        function getBlock(x, y, z) {
            const key = `${x}_${y}_${z}`;
            if (blockDataMap.has(key)) return blockDataMap.get(key);
            if (y < 0) return 0;
            const sy = getTerrainY(x, z);
            if (y > sy) return 0;
            if (y === sy) return 1;
            if (y > sy - 3) return 2;
            if (y === 0) return 8;
            return 3;
        }

        // 修改方块，并向 Firebase 发送同步请求
        function setBlock(x, y, z, id, updateMesh = true, syncToServer = true) {
            const key = `${x}_${y}_${z}`;
            blockDataMap.set(key, id);
            
            if(updateMesh) {
                const cx = Math.floor(x / CHUNK_SIZE), cz = Math.floor(z / CHUNK_SIZE);
                if(activeChunks.has(`${cx}_${cz}`)) buildChunkMesh(cx, cz);
                if(x%CHUNK_SIZE===0) buildChunkMesh(cx-1, cz); if(x%CHUNK_SIZE===15) buildChunkMesh(cx+1, cz);
                if(z%CHUNK_SIZE===0) buildChunkMesh(cx, cz-1); if(z%CHUNK_SIZE===15) buildChunkMesh(cx, cz+1);
            }

            // 【核心】联机同步逻辑
            if (syncToServer && isMultiplayer && userId) {
                const blockRef = doc(db, 'artifacts', appId, 'public', 'data', 'blocks', key);
                setDoc(blockRef, { id: id, timestamp: Date.now() }).catch(e => console.error("方块同步失败", e));
            }
        }

        function buildChunkMesh(cx, cz) {
            const key = `${cx}_${cz}`;
            if (activeChunks.has(key)) { activeChunks.get(key).children.forEach(m=>m.dispose()); scene.remove(activeChunks.get(key)); }

            const chunkGroup = new THREE.Group();
            const dummy = new THREE.Object3D();
            const blocks = Array.from({length: 8}, () => []);

            for (let x=0; x<CHUNK_SIZE; x++) {
                for (let z=0; z<CHUNK_SIZE; z++) {
                    const gx = cx*CHUNK_SIZE+x, gz = cz*CHUNK_SIZE+z;
                    // 高度扫描优化
                    for (let y=0; y<40; y++) {
                        const id = getBlock(gx, y, gz);
                        if (id === 0) continue;
                        const t = (bid) => bid===0 || blockDB[bid]?.type==='transparent';
                        if (t(getBlock(gx+1,y,gz)) || t(getBlock(gx-1,y,gz)) || t(getBlock(gx,y+1,gz)) || t(getBlock(gx,y-1,gz)) || t(getBlock(gx,y,gz+1)) || t(getBlock(gx,y,gz-1))) {
                            blocks[id].push({x: gx, y: y, z: gz});
                        }
                    }
                }
            }

            for (let id=1; id<=7; id++) {
                if (blocks[id].length === 0) continue;
                const imesh = new THREE.InstancedMesh(blockGeo, materials[id], blocks[id].length);
                for (let i=0; i<blocks[id].length; i++) {
                    dummy.position.set(blocks[id][i].x, blocks[id][i].y, blocks[id][i].z); dummy.updateMatrix(); imesh.setMatrixAt(i, dummy.matrix);
                }
                imesh.instanceMatrix.needsUpdate = true; chunkGroup.add(imesh);
            }
            scene.add(chunkGroup); activeChunks.set(key, chunkGroup);
        }

        function updateChunks() {
            const px = Math.floor(player.position.x / CHUNK_SIZE), pz = Math.floor(player.position.z / CHUNK_SIZE);
            if (px !== currentChunkX || pz !== currentChunkZ) {
                currentChunkX = px; currentChunkZ = pz;
                const keep = new Set();
                for (let dx=-RENDER_DISTANCE; dx<=RENDER_DISTANCE; dx++) {
                    for (let dz=-RENDER_DISTANCE; dz<=RENDER_DISTANCE; dz++) {
                        const cx=px+dx, cz=pz+dz, key=`${cx}_${cz}`; keep.add(key);
                        if (!activeChunks.has(key)) buildChunkMesh(cx, cz); 
                    }
                }
                for (const [key, group] of activeChunks.entries()) {
                    if (!keep.has(key)) { group.children.forEach(m=>m.dispose()); scene.remove(group); activeChunks.delete(key); }
                }
            }
        }

        // ==========================================
        // 5. 控制与 UI
        // ==========================================
        function buildHUD() {
            const el = document.getElementById('hotbar'); el.innerHTML = '';
            hotbarSlots.forEach((id, idx) => {
                const div = document.createElement('div'); div.className = 'slot'+(idx===activeHotbarIndex?' active':'');
                div.style.backgroundImage = `url(${blockDB[id].type==='multiside'?blockDB[id].top.url:blockDB[id].tex.url})`;
                el.appendChild(div);
                div.onclick = () => { document.querySelector('.slot.active').classList.remove('active'); div.classList.add('active'); activeHotbarIndex = idx; document.getElementById('block-name').innerText=blockDB[id].name; };
            });
            document.getElementById('block-name').innerText=blockDB[hotbarSlots[activeHotbarIndex]].name;
        }

        let moveTouchId = null, lookTouchId = null, joyStartX = 0, joyStartY = 0;
        function initControls() {
            const jBase = document.getElementById('joystick-base'), jKnob = document.getElementById('joystick-knob');
            const bindBtn = (id, fn) => { const b=document.getElementById(id); b.addEventListener('touchstart',e=>{e.preventDefault();b.style.background='rgba(255,255,255,0.4)';fn();},{passive:false}); b.addEventListener('touchend',e=>{e.preventDefault();b.style.background='rgba(255,255,255,0.15)';},{passive:false});};
            
            bindBtn('jump-btn', () => { if(canJump){ velocity.y = JUMP_FORCE; canJump = false; }});
            bindBtn('break-btn', () => {
                if(targetBlockData) { setBlock(targetBlockData.pos.x, targetBlockData.pos.y, targetBlockData.pos.z, 0); selectionBox.visible=false; targetBlockData=null; }
            });
            bindBtn('place-btn', () => {
                if(targetBlockData) {
                    const norm = targetBlockData.normal, p = targetBlockData.pos;
                    const nx = Math.round(p.x+norm.x), ny = Math.round(p.y+norm.y), nz = Math.round(p.z+norm.z);
                    const minX=player.position.x-0.3, maxX=player.position.x+0.3, minY=player.position.y, maxY=player.position.y+1.7, minZ=player.position.z-0.3, maxZ=player.position.z+0.3;
                    if (!((minX < nx+0.5 && maxX > nx-0.5) && (minY < ny+0.5 && maxY > ny-0.5) && (minZ < nz+0.5 && maxZ > nz-0.5))) {
                        setBlock(nx, ny, nz, hotbarSlots[activeHotbarIndex]);
                    }
                }
            });

            document.addEventListener('touchstart', e => {
                if(e.target.closest('.btn') || e.target.closest('#hotbar-container')) return;
                for(let i=0; i<e.changedTouches.length; i++) { let t = e.changedTouches[i];
                    if(t.clientX < window.innerWidth/2) { if(moveTouchId===null) { moveTouchId=t.identifier; joyStartX=t.clientX; joyStartY=t.clientY; jBase.style.display='block'; jBase.style.left=t.clientX+'px'; jBase.style.top=t.clientY+'px'; jKnob.style.transform=`translate(0,0)`; } } 
                    else { if(lookTouchId===null) { lookTouchId=t.identifier; touchesData[t.identifier]={x:t.clientX,y:t.clientY}; } }
                }
            }, {passive:false});

            document.addEventListener('touchmove', e => {
                if(e.target.closest('.btn') || e.target.closest('#hotbar-container')) return; e.preventDefault();
                for(let i=0; i<e.changedTouches.length; i++) { let t = e.changedTouches[i];
                    if(t.identifier===moveTouchId) { let dx=t.clientX-joyStartX, dy=t.clientY-joyStartY; let dist=Math.sqrt(dx*dx+dy*dy); if(dist>35){dx=(dx/dist)*35; dy=(dy/dist)*35;} jKnob.style.transform=`translate(${dx}px, ${dy}px)`; moveX=dx/35; moveZ=dy/35; }
                    else if(t.identifier===lookTouchId) { let dx=t.clientX-touchesData[t.identifier].x, dy=t.clientY-touchesData[t.identifier].y; player.rotation.y -= dx*0.007; pitchObject.rotation.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitchObject.rotation.x-dy*0.007)); touchesData[t.identifier]={x:t.clientX,y:t.clientY}; }
                }
            }, {passive:false});

            const endT = e => { for(let i=0; i<e.changedTouches.length; i++) { let t=e.changedTouches[i]; if(t.identifier===moveTouchId){moveTouchId=null;moveX=0;moveZ=0;jBase.style.display='none';} if(t.identifier===lookTouchId){lookTouchId=null;delete touchesData[t.identifier];} } };
            document.addEventListener('touchend', endT); document.addEventListener('touchcancel', endT);
        }

        // ==========================================
        // 6. 物理碰撞与渲染循环
        // ==========================================
        function checkCollision(px, py, pz) {
            const minX=Math.floor(px-0.3+0.5), maxX=Math.floor(px+0.3+0.5), minY=Math.floor(py+0.5), maxY=Math.floor(py+1.7+0.5), minZ=Math.floor(pz-0.3+0.5), maxZ=Math.floor(pz+0.3+0.5);
            for(let x=minX; x<=maxX; x++){ for(let y=minY; y<=maxY; y++){ for(let z=minZ; z<=maxZ; z++){ if(getBlock(x,y,z)!==0) return true; } } } return false;
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now(), delta = Math.min((time-prevTime)/1000, 0.1);
            
            updateChunks();

            // 射线检测
            const interactables = []; activeChunks.forEach(g=>interactables.push(...g.children));
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const intersects = raycaster.intersectObjects(interactables);
            if(intersects.length>0 && intersects[0].distance<6) {
                const hit=intersects[0], mat=new THREE.Matrix4(); hit.object.getMatrixAt(hit.instanceId,mat);
                const pos = new THREE.Vector3().setFromMatrixPosition(mat); pos.x=Math.round(pos.x); pos.y=Math.round(pos.y); pos.z=Math.round(pos.z);
                targetBlockData = {pos:pos, normal:hit.face.normal}; selectionBox.position.copy(pos); selectionBox.visible=true;
            } else { targetBlockData=null; selectionBox.visible=false; }

            // 物理
            velocity.y -= GRAVITY*delta; velocity.y = Math.max(velocity.y, -40);
            const moveVec = new THREE.Vector3(moveX, 0, moveZ); if(moveVec.length()>1) moveVec.normalize(); moveVec.applyAxisAngle(new THREE.Vector3(0,1,0), player.rotation.y);
            let nx=player.position.x+moveVec.x*SPEED*delta, ny=player.position.y+velocity.y*delta, nz=player.position.z+moveVec.z*SPEED*delta;
            if(checkCollision(nx,player.position.y,player.position.z)) nx=player.position.x;
            if(checkCollision(nx,player.position.y,nz)) nz=player.position.z;
            if(checkCollision(nx,ny,nz)) { if(velocity.y<0){ny=Math.ceil(ny-0.5)+0.5; velocity.y=0; canJump=true;} else{ny=Math.floor(ny+1.7+0.5)-1.7-0.5; velocity.y=0;} } else { canJump=false; }
            player.position.set(nx,ny,nz);
            
            if(ny < -10) { player.position.set(0,30,0); velocity.set(0,0,0); }

            document.getElementById('pos-val').innerText = `${Math.floor(nx)}, ${Math.floor(ny)}, ${Math.floor(nz)}`;
            
            syncPlayerTransform(); // 推送给服务器

            // 清理僵尸玩家 (超时未发数据)
            const now = Date.now();
            otherPlayers.forEach((p, id) => { if(now - p.lastUpdate > 10000) removeOtherPlayer(id); });
            document.getElementById('players-val').innerText = otherPlayers.size + 1;

            prevTime = time; renderer.render(scene, camera);
        }
    </script>
